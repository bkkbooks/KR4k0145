body:
  text: 花案奇聞清岐山左臣著花案奇聞引子此言雖小可以喻大明乎為説之小者未必遂無當於大道也如必褒盲腐而斥稗編則何以好奇搜逸者乃往往得談資於野史也耶楚阿谷之陽有處子佩琪而浣者孔子于南遊見之曰彼婦人其可與言矣乎其文見漢韓嬰外傳而後之以此藉為口實者遂未免有聽琴奔月偷香窺宋之想繼而出自不已之事豈善學聖人者哉然要知真聖賢必不作腐事所謂諳于大道而為學士大夫者當不必徒尚乎口中之朱程焉可矣茲説半出傳聞因演其事亦聊以蕊浪波痕供鼓掌於一時雲爾若夫以妖豔之書啓天下淫男子逸蕩之心則妄語之誡舌戰之禍固生平所自矢不為矣江表蠡庵花案奇聞蠡庵跋讀萬斛泉即女開科傳別名點校者注竟不覺拍案大叫曰遊戲三昧已成勸懲全書憤世絶俗半多詼諧笑話説中説文人説才女説清官説貞友能使天下之人俱願合掌俯首敬之拜之而已至裝腔之孿童設騙之暗黎狠毒之訟師多事之乞婆拚命之驛丞種種諸人何異一部因果一部爰書一部小史記一部續豔異有能奉此為書紳帶之為韋佩則不但人世清淨亦得佛門歡喜是濟渡一世之寶筏維持天下之瑤琛也若僅以小説視之亦可謂不善讀是説矣質之衆口我言匪諛虎丘花案逸史花案奇聞調風入松且調律呂嚼宮商花底漫持觴亂紅深處鶯聲碎聊指點鑿破天荒糟爛兩闈科第醅傾幾代興亡半世英雄多少忙轉眼費商量青蚨無數飛如蝶熱血千年冷似霜後得新聞堪笑番成花浪詞場花案一書大意詩曰風秀士奇開花案雌狀元私賺春魁狠禿子情迷色陳潑孌童刺犯霜威廉禦史烏台執法老驛丞蟻命成灰盡餘生兩番報捷終湊合三夢為媒花案奇聞目録第一回新傾蓋風流出陳第二回誤尋芳花煞勾嬌第三回女生員棘闈對策第四回喬禦史瓊宴辭魂第五回駕薰風背地興波第六回飽齋僧當堂獨桌第七回母夜叉訴逢馬扁第八回老驛丞命棄流妖第九回挈相思月舠偷泛第十回憑好夢鬼窟全生第十一回陡題名喜聯待詔第十二回三合巹各湊奇緣花案奇聞第一回新傾蓋風流出陳詩曰名流應不愧清時為唱新文第一枝恥把盟心循故事誓從刎頸結相思片言投契非關酒千里聞聲豈為詩但得情深堅似石天南解北總如癡可恨這一片清白世界卻被一班兒險媚的惡朋弄得不上不下不乾不淨以致血性男子看不上這些合汙陋態沒奈何只得閉門吊影離群長歎而已人又道他孤孤零零滿肚皮不合時宜于朋友面上何其冰炭不知別有一種深情未可為一二俗人道也卻是為何只因世人不曾解得朋友二字明白故此只曉得一味奔趨勢利而已你道那些獻諛阿好的好象什麼東西就象那鵓鴿子一般只飛向旺的去處又好象糞坑裏的蛆蟲越臭越鬧處他越鑽得高興況目今掇臀呵卵的頗多到數不著那拂須丁謂滿天下儘是乞憐搖尾之人如何算得那嗥嗥師聖若此等輩就使孔聖人孟夫子朱文公程伊川諸聖賢都生在一時日把綱常倫理之言耳提面命又安能使這廝涎臉頑皮收轉奔趨鑽刺之習總是胎骨生成無法可治你若不信請看今日世上的朋友人人管鮑個個雷陳社小弟沿街塞滿老盟翁遍地稱呼只除是漏澤院中與那卑田隊裏疲癃殘疾的或不屑把臂相知邀湊蘭譜若夫隸優娼座之儔輩皆芝蘭共籍之嘉賓也所以然的原故看官們知道麼或有父兄現在要津或子弟叨登科第盡力奉承百般趨事第一望他提攜挈帶第二花案奇聞希圖關説影射第三托勢裝腔第四作家肥嘴種種利益就是獻妻貢妾嘗糞吮癰這樣極不肖極齟齪的事體推他的意思都是心悅誠服的事若要他攢一攢眉兒道半個不字這也不為希罕卻還有一樣人本領實系粗淺遇著同輩中間或小考僥幸搭在前列他就自愧不如登時傾心下氣便認定他是名流若使自己家業殷饒畢竟也要設法挨身聯為同契誰知這班名士招搖聯絡聚將攏來不是局賭就是幫嫖各逞自家的高強手段青天可折泰嶽能移無非要騙些銀子銅錢那管得什麼禮義廉恥故此莫説對那朋友這般這般就是那衙門裏胥史盡著與他聯交班房中皂快何妨認為至戚藉為漁父之引用作狐假之威阿兄小弟此中大有便宜盟長契翁就裏不無作用你看勢利二字自古為然於今尤甚總之世道軟熟已是天造地設的了你有什麼本事翻得局來這也不必説了更可怪的還有一起女流一般也學訂社一般也講聲氣一般也趁花朝月夕吟詩弄柬一般也同騷人墨客標榜應酬尚書當初有一半老佳人姓章名台字雙青日懷社弟名刺隨遊詩草遍謁知名之士及看他的詩稿只不過是東掇西攛湊集來的套頭指粉又有那不出頭的山人措大替他捉刀猶之走名秀才拼著兩數銀子刻幾篇倩人改削的窗稿有年沒月的考卷將來圈圈點點冒名某觀風某月課某老師批評某同盟僭筆總是瞞天扯淡好似南京城隍拜上北京土地絶沒一些對會影響咳社風流染竟到男女混雜的田地豈不可恨想當初劉孝標絶交論中五交三釁尚未及此一種妖耳若是真正才子自不屑與此輩為伍結識一二相知朋友砥志勵行即偶爾間戲必要做出絶無僅有的事為千古一段風流佳話正是花案奇聞琴樽風月間生計金玉松筠舊歲寒話説南直隸蘇州府有一個秀才姓余雙名夢白表字麗卿他父親曾為顯官母親纍受封誥兩個已是中年年紀再不能夠得生一子那夫人終日妝金塑佛修橋砌路不知行了多少的好事只求天賜一個男兒幸喜天公感應老兒爭氣婆兒風騷不知不覺那夫人腹中懷孕將次分娩一夕餘公忽夢見天上一帶白虹綿亙數裏憑空冉冉飛將下來覆在他的屋上頃刻間化做滿堂的金光采色炫耀餘公拍案叫奇卻原來是南柯一夢未幾耳根頭只聽得夫人口裏哼哼的叫著肚疼越聽越叫緊了好象要分娩的聲息餘公連忙披了衣裳喚起丫鬟上了燈火即時傳命家童去喚請穩婆到家不多時生下個孩兒眉清目秀呱呱響亮餘公看了一會回想昨夜白虹之夢豈非佳兆遂命名為夢白乳名虹即口占古虹詩一首道紆徐帶星渚窈窕戾天潯逸勢含良玉神光滲瑞金隨雇了一個乳娘撫養愛惜真同掌上之珠一般果然才生五歲聰穎異常六七歲經書已曉就喜吟詩作賦十三歲進學十六歲補稟十七歲給賞一次本房把他卷子幾乎中了解元因大主考比並一卷要中元的遂將此卷挨在第二房師賭氣情願不中説道留到下科不怕不領解額殊不知反誤了他的前程大事要曉得功名遲早都是命裏生成的如今的人不肯安分守己拼力結緣豈知這個蒼蒼的老天專好把功名二字顛倒英雄弄得人死不得活不得那許人一概鑽刺到手就使錢神有靈筆花無色鑽刺得到手了後來也決不受用那比得貧士辛苦之乎者也沒日沒夜公道掙將來的得之雖艱安享自久要曉得麗卿並不該中在散榜豈但不該中元花案奇聞所以麗卿高見竟不把那功名兩個字放在心上只是娛情詩酒散心山水間不料他父母雙亡過了雖然剩得潑天的家産卻是未完婚配只得孑然一身他父親的同年故舊往往央媒來替他説親他説得好要做我的渾家殊非是今世上沒有的才沒有的色方可牽絲結褵不然休想我去做他家的風流佳壻故此大言落拓蹉跎過了日子今年已是一十九歲了一日正在書房裏啜茗焚香枝頭好鳥呢喃作伴獨有一個黃鶯兒百般巧囀那鶯兒煞是作怪得緊又偏朝著麗卿如泣如訴嬌啼不已飛翔回盼總是不離這一搭兒所在這正是嚦嚦嬌聲花外囀紛紛春色上枝來又道是好鳥枝頭亦朋友落花水面皆文章只這一個黃鳥兒便打動了麗卿問花訪友的高興那麗卿就於此時呆想了一會口占一絶道春鳥枝頭叫不休春花春盡倩誰留為尋芳信傳春緒惹得春情處處愁吟詩已完提起筆來信手寫在花箋幅上忽然歎口氣道近世交道衰青松落顔色人生在世縱使百年得醉三萬六千而已當此春光明媚之時若只一味撚著這幾本殘書幾枝禿筆終日加虱處褌中忙忙碌碌過了日子卻不被這些多情的花鳥笑殺了嗎你看枝上鳥聲無非求友何以人而不如鳥乎隨即喚書童司茗來問他近處有甚麼好灑落的去處麼那司茗終日伴著麗卿在書房裏只好打瞌睡那討得出外去玩耍聽得這一句説話竟不知這個歡喜從那裏掉下來的連忙答應道相公若要尋耍子的去處那裏沒有只是好笑我們蘇州人個個只認得一座虎丘山此時正是三春頭裏熱鬧有趣的時節美女嬌娘絡繹不絶相公何不帶挈司茗也看看花案奇聞景致麗卿原有十二分高興要去又聽得司茗這番慫恿那兩隻腳就象有人推他的一般不知不覺走了出去巴不得一腳就跨到山塘連忙叫司茗鎖書房同去一遊只見打扮得濟濟楚楚但見他衣剪春煙神凝秋水春情籠面依然弱冠之年詩思壓肩生染書生之態衛清臒不足數也潘安妙麗何足道哉絶非紈褲行藏果是風流人物不教擲果滿車定惹阿嬌看煞卻説這蘇州古名陽羡東際大海西控震澤山川沃衍江南之都會也佳勝第一是虎丘山在府城西北一名海湧峰上有劍池千人石生公説法台吳王闔閭墓為何喚作虎丘世傳冢內金銀之氣化作白虎踞其上因以為名至迤邐而南西施洞館娃宮浣花池采香徑及琴台諸勝無不了然在目而下瞰太湖洞庭兩山滴翠浮煙何異那白銀鋪世界景致奇絶每逢月上風來遊人簫管和歌石上各奏所長雖萬籟無聲之後猶有清音繚繞尤非他處名勝可以仿佛一二麗卿同著司茗兒一徑來到寺裏遍處觀看果然曲檻洞房回欄精舍呼茶喚酒百般俱有一片千人石上蹴球演法詩畫骨董説書談命盆魚卷石花碌碌簇錦相似就有官宦人家夫人小姐前呼後擁遮遮掩掩的也有村莊市鎮男男婦婦攜兒抱女挨挨擦擦的那司茗鑽過東鑽過西手舞足蹈看個不了獨有麗卿全不把這些挂在眼梢上只自間行緩步走來走去只見一個茶社桌兒上安著一副上帳的筆墨麗卿不覺打動詩興便提起筆叫司茗磨濃了墨就在那粉壁上題詩一首你説麗卿終日在書房中那曉得外邊有這樣妙處今朝豪興得極拿起筆來不費思索恰象原舊做成在肚皮裏的煞時間寫出一首七言八句的律詩説道花案奇聞春氣催人到此遊吳山吳水不關愁暗香夾路通深竹遠色浮光映野鷗倚石賦成將落日尋花興滿欲歸舟共傳此夜千人月繚繞煙雲為客留詩已寫完遊興將倦正思歸去忽見那説法堂月臺有一班兒人在那裏鋪著一片氈條參差團坐猜枚耍笑聲振林木麗卿走近前來一看雖然都是不認得的朋友卻是與我年紀不相上下不知此等是何許人物想他不是南州冠冕定是中林蘭蕙那幾人你道此輩委實生得何如美如冠玉潤似明珠瓊姿皎皎堪雲國士無雙玉影翩翩宛是青蓮再世果然生得一表非俗麗卿心裏想了一遍腳底下又欲走又不欲走遊遊衍衍只顧看著那些人那些人看見他獨自徘徊卻也湊趣都立起身拱一拱手對著麗卿道我輩偶爾間遊深荷尊兄青盼若不棄嫌狼藉敢屈同坐一談麗卿笑道小弟一時緩步見諸兄情興勃勃卻又不是敝處聲音有這等豪興的決是我輩中人了既蒙雅愛便當促膝只是無端闖席殊覺不雅那二人道宇內皆知己天涯悉弟兄生平快事莫過於此何必拘拘形迹為嫌於是五人歡然坐下麗卿先開口問道諸兄高姓尊表貴籍何處一個道小弟叫做梁文昭賤字遠思陝西長安人同家君宦遊到此此兄姓張諱眉字又張遼東廣寧人他尊公亦仕籍貴省我兩人雖則祖貫西北卻是生長南方此兄就是王子彌此位師父就是三茁就是一處寺裏的首座不知吾兄尊姓貴表麗卿道小弟姓余賤名夢白表字麗卿年逾弱冠蹤迹飄零除此詩酒二字外人卻知有小弟小弟亦不復知有世上花案奇聞矣遠思道仁兄高懷磊落非弟輩之可及今年仁兄貴庚公郎有幾了麗卿不覺失笑了一聲回復道小兒尚艱于得母二人不覺驚訝起來道弟輩只因生平自負薄才兼有情僻誓不肯與凡流女子結緣誤我終身大事若説富貴到也不在話下至如仁兄的意氣仁兄的才華何故尚遲逮吉之期未遂桃夭之願難道世上又有同心如吾儕者乎麗卿亦大叫道天地間只道止有小弟一個不意復有二兄今日一會可稱生平之奇遇矣我們要曉得大丈夫生在世上只恐不曾讀得幾句書若是果然真正讀得幾句書那功名二字是吾輩囊中物就是得之不足為榮失之不足為辱朝榮夕落豈堪耐久若説到妻子之間不娶一個有才有色有情有德的絶代佳人終身相對便做到玉堂金馬終是虛度一生最可笑如今的人有一種愚見説討老婆畢竟要擇門當戶對人家閨女殊不知呆定在人家閨女中尋那般絶色有才的卻也一生一世不要想著討好老婆了前日曾有一個強作解事的人對小弟説道就是低醜婦人裏面頗有才情這一發胡説得緊無鹽嫫母縱負奇才對著這副尊顔怎生看他得過所以遴選女郎畢竟色為第一譬如批評文字開口松脆秀色可餐就引人圈圈點點增起文章聲價猶之女貌鮮豔動人我見憐之想庶幾對之者揣摩他這樣龐兒定有情致定有才思一直摹擬到曉妝燈下對月臨風並許多説不出的睡情矯態只管研磨不了方演出一段房帷精細的學問列兄以為何如又張笑道仁兄妙論天開真沁人肺腑實獲我心麗卿又道今日我三人傾蓋知己心事略同若得始終無二方好不然亦終為山水所笑美人不許二兄倘不我棄即花案奇聞奉此一片石為盟主以訂終身三人不覺鼓掌遂為八拜之交先敘年譜麗卿少又張一歲又張少遠思一歲三人依次稱呼復令小使飲酒呼盧浮白暢飲一番只見王子彌替三茁和尚見遠思三個説長説短情投意合卻與他們説不投機兩人自斟自酌已是陶然爛醉遠思説道今日之飲固樂但是一味山水亦覺寂寞得極聞得此處有名姝數人精通翰墨弟雖企慕已久急欲一見只恐有才無貌或是有貌無才即使有才有貌而於情甚寡不足邀我輩之賞鑒就是説有才有貌的或者是世俗之所謂才貌就是情有所鍾亦未免為勢利所引不足以當我輩之識賞也不若明日相約同往一評萬一是我輩姻緣落在這裏亦不可知總之天下的事大都在無意中倒有些好處不可當面錯過看他那三個説到風流有趣的所在豐神秀異如羊車入市之玉人志氣豪雄似破浪乘風之文叔冰壺皎徹珠玉琳琅我見猶憐何況女子三人因此約定明日清晨又張邀遠思遠思邀麗卿各帶精細小童集於某處以某為蜂媒以某為蝶使以某為窺簾之燕以某為探水之鷗大索花間豔史廣羅曲陌朱顔只此豪舉掀髯談笑登壇指畫三人各道寓所盡興而散即一席間生出許多枝葉正是天上星橋信可通今朝行會蕊珠宮深藏鸚鵡春枝香透出瀟湘點綴中擬定明日出陳偵探花叢或是天臺路迷或是桃源漁引或是張騫海上之槎得支機于牛渚或是邯鄲夢中之遇銷王枕于黃梁不知此興如何且聽下回分解花案奇聞第二回誤尋芳花煞勾嬌詞曰憑花開處香分樹花自生香花弗知幽以佳人能點染豔因才子共籌思文章寄傲傳花信翰墨留心泛酒卮一集名媛千古異喬裝次第壓新枝自仆論之雖則是風流韻事也要不脫腔骨即不能從名教中尋出樂地也還是守著這幾句孔孟的樣範終不致敗壞行止玷辱身名如今世上子弟們甚是輕薄得緊見了老成前輩沒有一個不裝鬼臉不贈譏評的還要訕他是假道學腐頭巾下惠等於盜跖仲子疑是齊人且説姦盜詐偽的事偏是賢良方正的做將出來更道這些人死去若到大成文宣王殿上朱紫陽院中做小鬼卒判也沒了站立處還只恐怕倒把他的腐臭之氣連閻羅天子被他沖倒哩如此誹誹揚揚罵得那先輩開不得口只得歎口氣道吾道之不行也命矣夫退避三舍而已故此惡少成群雌黃滿口據他所好的只曉得花柳場中最忌的是一件煞風景無論賢愚好醜都一齊趕興幫間去做那篾片白賞原來那種人的本錢不消大破費的只要掙扎得幾件道地衣服繃在身上或是道聽些風月機關的間談陪闖寡門幹幫插趣他雖靠著大老官卻也頗裝身份究竟只好騰那幾個歪辣妓女哼奢這幾個熟識的優童動不動把相公兩個字穿在嘴上淩辱斯文公舉不消有起得草稿已曾預先揣正在袖裏只要臨期尋得頭腦填上姓名呈送便了要曉得他們何曾敢當真淩辱幾個斯文花案奇聞不過是斯文中下流無非借此開科詐些酒食銀兩俗語説得好腰裏撒撒口裏嗒嗒不然如何能夠得終日酮酕如何能夠嬌其妻妾似此等輩比比而是我想當初唐伯虎賣身為仆去騙那華學士的丫鬟徐文長假做偷兒倒詐了夜巡官的銀子這樣風流不羈豈是容易學的後來便有一人推而廣之要看相起自家內戚中一個女子糾合了許多朋友扮做強盜明火執仗打到那家聽憑衆人去劫虜財帛他則搽了茶面孔一徑抱定此女云云不放臨行時又把他的臂咬上一口竟不知是甚麼掩障法兒畢竟後頭做將出來登時正法要曉得那謝幼輿的投梭折齒幾曾不纍清名司馬長卿之琴挑月竊究竟未為佳話如今人開口便援引伯虎文長一流人物把相公白眼高擡一世終日撮空打諢思量吃酒趁錢到底還奉承自己一件不美的事弄到喪身敗節的田地是知世態澆漓居心多不乾淨弄巧成掘比匪生非便遲之又久已不知不覺逐我出聖賢門外逼我在小人路上總是病入膏肓難以藥救嗚呼晚矣噬臍何及為此只勸世上的人切不可以聰明貽禍切不可以機巧傷心切不可用盡名士英氣切不可使盡朋友勢力切不可賣盡假裝學問切不可賺盡打詐銀錢笑人人笑天報不爽還只是守分的卻得安穩間話且按話説餘麗卿在虎丘寺裏相訂了梁遠思張又張這番高興回到書房中眼也不合巴不得到天明梳洗了連早飯也不思量吃就是勉強吞了幾口也覺得口裏毫沒一些滋味麗卿原是色中餓鬼只因眼眶比別人高了幾分看得世上這些女子卻都是些魑魅魍魎一般走到他面前便把兩隻眼孔丟在別處去了故此只好獨自一個蛹處藝窗有詩寄懷為證世間榮落重逡巡我獨丘園坐四春縱使有花兼有月可堪無酒更無人花案奇聞青袍似草年年緑白髮如絲日日新欲逐風波千萬裏未知何路到龍津卻説閶門外柳潭深處有個女娘年方一十七歲名叫倚妝原是揚州人説他風致如何就是沈魚落雁閉月羞花八個字兒還只形容得他三分五分況且會得做幾句詩詞歌賦又會得臨幾筆米蔡蘇黃可憐倚妝他原是好人家兒女只因連遭兵火地方殘破了父母各不相顧逃竄東西不知下落卻被賊兵拐來賣把販梢的客人做了一個行首看官們你道世間何事用不著勢利不消使狠毒只有做了娼家是無可奈何的了未免有些勢利有些狠毒若論到世間勢利之極狠毒之極又莫過於娼家之老媽媽老親娘虧得倚妝生得十二分標致那媽媽心裏全想靠他過活此生故此百依百隨無所不至的奉承他誰曉得那倚妝原是舊家骨肉那肯倚門賣笑整日吟詩寫字燒香吃茶自幹自己的營生媽媽也無可奈何近來又添了幾個相知的姐妹一個叫做文娟一個叫做弱芳共集青樓二十多人結一花社內中就是那文娟弱芳也不是行院人家生養都是與倚妝一起來的故此他三個越覺比別人過得親熱每逢春色嬌妍百花爭媚柳眉初展鶯語撩人的時節攜手憑欄尋詩分韻賭賽所長直是花隊中一大風雅勝會也若是説到風清月朗四個那倚妝倍覺留心或是獨坐無聊乘間俏步便即焚香暗祝説道老天老天若使我遇得一個多情的才子把我這個身子託付了他也不枉你生我這般一個花容月貌若只是風塵碌碌終陷章台倒不如尋個自盡的門路也省得在上受苦欲界色牢何殊阿鼻地獄説到這段光景哽哽咽咽更有何言惟有暗拭啼紅輕衫濕透而已故雖隨行逐隊勉強支援一段心事終是鬱鬱正所謂花案奇聞沈憂萬種與千種行樂十分無一分倚妝因歎誤墮風塵紅顔薄命作詩一律以志悶懷詩上寫著道家在春郊碧草園懶將愁緒問停轅飛花帶雨沾衣濕舞絮隨風繞徑翻強對管弦收涕淚即逢樽酒略歡言空閨遍地皆明月猶幸傷心無夜猿只這一種牢騷心事就是日常裏最相知的姐妹們也都看他不出只有文娟弱芳兩個同病相憐互相慰藉況且如今風氣險惡自有那一等使勢的紈褲子弟倚著簪纓世胄腰纏大鏹終日闖鬧寡門使酒撒潑動輒指揮狼仆生情打詐聲揚送官故此倚妝一班兒被這廝吵得不耐煩越覺看得青樓中沒有個出頭的日子只得借此花下陶情臨風消遣一日他們正在百花亭上荼藤架過靠著太湖石分題做詩倚妝正爾沈吟不覺拊掌粲笑起來及坐姐妹們攢住問他他又不做聲你道好為著什麼嫋娜作態未肯輕言只因偶然想得幾句好詩未免有落筆驚人的意思這個就對衆人説知也是癡人説夢故此只是不響大抵如今個的人會得做幾句文字就把兩隻眼睛放在額角上了豈真絶世奇文只見世情薄態況且女娘家哪里曉得做甚麼好詩不過是附名赴社何曾有甚麼搜索出來看他們或是逐流鶯或是撲粉蝶或是戲打秋千或是摘花插鬢這就是他們的本事了何怪乎倚妝之笑而不言也詩曰風透疏簾月滿庭倚欄無事倍傷情煙垂柳帶纖腰軟露滴花房怨臉明愁逐野雲消不盡情隨春浪去難平幽窗漫結相思夢欲化西園虹未成花案奇聞卻説麗卿同了遠思又張三個去尋花隊佳人偏是一時沒處尋覓自早到午天臺徑杳終無指引又張説道天下世間哪里有甚麼絶色的女子明明都是我等胸中一段妄想幻出天仙勝概把這個想頭只管想去連自己也不知不覺只説是真了蜃樓海市皆以氣成白馬猿猴總緣心造就是那陽羡鵝籠中無數錦屏美女酒肴笙管幾曾有一件不是從空中幻出我們如今不如以心問心以意問意或者也象那真真一般叫他下來也不可知若説畢竟要搜尋出這般人物想是斷不能夠的不如回去了吧麗卿無數高興卻被又張掃得冰冷一路回來毫沒一些意緒思量起來的時節何等時節何等心熱不覺隨口吟出一首絶句説道無端客思為誰憑枕簟生寒夢不親乘興杳然還寂寞不知何處問香塵一頭念一頭走將次走到一座花園門首只見粉牆半築高柳披簷一陳陳蘭麝氤氳撲鼻吹來麗卿笑道我們何緣倒得到此衆香國中壺天別院來又欲尋段安香賈陵華耶説言未了卻走到一條小橋西畔柴扉關掩的去處望見裏面一個小閣兒上有數位女郎在那裏説説笑笑也有緩步沈吟低頭構想的也有捉筆捷書指腕不停的麗卿等見了又驚又喜目動魂搖真是天付機緣非同小可一時就想要闖將進去不知何等樣人家免不得伸頭縮腦張而又望又恐怕他們看見驚起散去個個都把身子在花叢之下隨著花兒遮著偷窺了半晌諸美態度盡入目中麗卿已是個個屈指評品飽年看純熟惟有一個穿素羅衫兒的更比衆人生得一萬分天姿國色舉動非常麗卿不覺失聲狂叫起來説道我們今日已置身九天瑤島生非劉阮何緣到此怎見得這女子好花案奇聞處但見梨雨肩拖柳風腰折白羅衫影無非織就春思烏髻雲堆總是天然圖畫撥開半幅桃箋揮就一枝斑管墨賓挾雨須臾至腕鬼驅龍頃刻飛真絶代之佳人實風流之渠帥你説麗卿見的卻是哪個正是倚妝終不信是人是仙是真是夢卻把遠思又張樂做一團不勝欣幸道今夕何夕見此粲者麗卿肚裏想著道但不知此女是誰家閨豔可能使餘麗卿撮合否萬一此女已曾許嫁人家落於村夫之手我麗卿就終身想殺也是徒然要曉得這個老天把我這個身子原不曾定叫你呆呆地活在世上我便為他想殺了到九泉之下亦何等風騷何等快活就是做鬼也不同些麗卿正在那裏胡鬧猜疑遠遠見廳柱上頭貼著一對春聯定睛一看上面寫著道西子去時遺笑靨謝娥行處落金鈿麗卿不覺大笑道你看柱上春聯斷是青樓無疑矣扯了遠思又張大膽踱將進去早是驚動春閨仙侶倚妝雖則低著頭不先已瞅見麗卿心中已是十分注念但不出口直等衆姐妹笑臉嫣然聞聲啓問方才假意錯愕起身向前説道阿誰少年從何處來妾等素昧生平何幸降臨玉趾麗卿聽見這個嬌嬌滴滴的聲魂靈早已被他勾去舌翹心戰不知所措停了一會回他説道小生久慕瓊宮無由造晤今日竭誠專訪幸得睹面不負此生但我又見諸英畢集案頭筆墨淋漓定有佳韻在此未知肯不吝瓊瑤使得小生一披珠玉否倚妝回顧諸姐妹含笑説道妾等下裏巴音何敢班門弄斧不堪呈教見笑大方又張道麗兄既請教殷勤不必過謙了唼笑向袖中取出一張箋張雙手遞與麗卿麗卿手雖接著花案奇聞花箋卻一眼釘在倚妝臉上卻不知又張在麗卿手中輕輕的將這箋兒預先拿過運了遠思把手在麗卿肩頭上一拍道麗兄花箋掉下地了麗卿吃驚一看自家大笑起來連倚妝衆人也都笑個不了麗卿道此是何物輒敢偷去又張道誰教你不小心遠思道麗兄若肯深深作又兄一個揖我卻勸他還你麗卿假作正色道衆姬在前休得取笑快把詩出來一同看便了又張戲著這臉對麗卿道看便就看卻是便宜了你些取出詩來三位攢做一堆看那箋上半真半蠟寫著五言律詩一首三個一字一讀讀到中間一聯遠水浮仙倬寒星伴使車二語麗卿拍手狂叫道只此二句真五律長城即使青蓮仰雲攻之毋能頽其一雉彼薛濤而下可置勿論也看到詩後又有花社四集倚妝漫草八個字麗卿失驚指著對遠思又張道原來就是他詩既清麗楷書又妙名下無虛士信然信然倚妝道賤妾俚言適足以汙尊目隨將手指著文娟弱芳道此二妹所作更勝妾百倍耳又張遠思道正要借觀倚卿所舉一定不謬連索二姬詩稿二姬向案頭取付倚妝笑對倚妝説姐姐佳詩固足供名流清賞如妹妹輩不過效顰何苦定要向人前獻醜耶倚妝也不回他竟遞寫遠思又張二人各爭取一首遠思所接是弱芳的詩又張所接是文娟的詩好象得了一件寶貝一般各人珍藏讚歎只有又張仍恐麗卿照依自己搶詩的法門只顧偷眼看那麗卿只見麗卿還是雙手捧著倚妝的詩箋口中咿咿唔唔倚妝對麗卿道半日接談尚不知三位郎君尊姓貴表麗卿道那一位是張又張相公那一位是遠思梁公小生就花案奇聞是餘麗卿倚妝驚訝道原來就是余相公妾與郎君神交已久若非素有姻緣何由得此邂逅麗卿因攜倚妝手向闌幹幽靜處低語道與卿乍面似有夙緣便我不勝心醉但卿如此才華如此儀容寥落風塵我於倚妝寧不心碎倚妝見麗卿説到這個所在不覺潸然淚下對麗卿道賤妾誤落平康實由命薄但妾非不欲了此火坑每見纍纍薄情無一可托者不斯幸會郎君此身諒不作章台剩柳倘君不以賤妾為可鄙或尊夫人大度肯見容妾願備員小星終身有托自薦之恥不識君能見憐否麗卿正要回答忽見遠思攜了弱芳又張攜了文娟一路大叫將來你二人在此説些甚麼心事麗卿説我兩人説的就是我兩人的心事大家笑了一場倚妝道妾家即在東鄰數武何不偕二位尊朋同到寒舍為竟日之談一洗心曲不知尊意若何諸姬各自星散三生躡迹尾隨到門但只見珠簾半卷飛來紫燕雙雙繡幕低垂驚起黃鶯個個窗明幾淨墨舞花飛絶不同繡戶深閨卻宛似西園東閣進了門媽媽出來各問姓氏相接殷勤開筵密款三人在坐間還是讚歎不已麗卿因對遠思道弟恨飄流一生尚似浮萍浪蕊而倚妝天上奇葩偶爾誤落塵凡不可多得姻緣天合諒必心許但花間吟詠還是私社必經品題方可流傳人世當即令稗官氏編入豔異集中作一段佳話明日弟當捐千金之資會集諸姬比例分房棘試使英雄入彀者各給花紅彩帳效曲江聞喜宴題名雁塔以紀一時盛事庶不負衆姬平日一片苦心也兩個鼓舞從事倚妝見麗卿這段光景已知他不是薄情種子風流都雅更是死心塌地而弱芳文娟卻又與那遠思又張交頭密語促膝深談各自心照不宣文娟道評花應試允為快舉我們雖則不才亦望帶挈花案奇聞照象求選科舉的士子望乞太宗師老大人千載奇逢一視同仁倘蒙收録觀場曷勝焚頂大家哄堂大笑酒闌言別麗卿已去料理一應科場事宜好不匆忙但不知風流舉動究竟何如且再看下回分解花開花謝誰為主若個憐花花不怵謾道嫦娥終不嫁書生早已傍蟾宮女郎棘試從來罕事楊用修春容簪花木蘭女戎裝遠戍其中以男作女以女作男固稱絶世奇談然未有如麗卿花案舉動之驚天駭衆者也千古韻事倚此韻筆乃傳不朽花案奇聞第三回女生員棘闈對策詩曰上林春色鎖芳華勝地名媛興自賒曉色半開鬟影亂徑香初動舞衣斜腸柔欲擬英雄鬥筆徑偏從錦繡誇裝就青天平步上深閨咫尺是公車戲場考試舉子只是一聯耍對此法原從唐制考選詞賦小變出來實是徑截可仿既省了開科諸費又好斷絶了隨緣