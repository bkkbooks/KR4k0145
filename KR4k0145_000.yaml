畏怎見得但見門設重重老蒼頭專司鎖鑰號分楚楚小妮子盡挂牙牌前前後後但聞得喝號提鈴往往來來誰個不巡風擊柝考試官監試官關防甚密東文場西文場立法惟嚴真是點水不從門縫泄微風敢許外人通倚妝是新宗師科試第一名領批的女生員雖則是頭一牌頭一個先點著他點過他倒不望門內進去竟走到唱名官的案桌旁邊立著候衆女生員都點完了方才入場此亦是點名舊例倚妝老成嫺熟好象是日日進場磨練的這些規矩不消提撥一毫不差其餘依次魚貫而入正唱名間只聽得下面搜檢女丁高唱一聲雲生員夾帶蜂擁一人到監臨面前監臨喝道那生員夾帶在何處女子笑應道藏在陰戶內監臨笑道本院聞知閩地闈中夾帶文字多有在糞門內搜出者這女生員陰戶比男生員糞門較寬況男生員應試七篇文字女員今生只用一首詩詞所藏紙窠較少此是真的了快取上來看只見衆女丁便手去女生員褲中挖一卷來兩旁火把光中一照卻是幾張血淋漓的草紙衆女子不覺失笑連監臨散卷官一齊哄笑起來仍叫入他進去唱名已畢即便封門分給題紙以春閨為題各限七言律一首交卷即時彌封分落兩房考取中式呈堂定奪當花案奇聞時受卷官撿出白卷子三束送監臨驗過登時貼出貢院門外不在話下你説今日的事體衆姬原有一社平日摻練揣摩純熟已久如何還有不識字的遞白卷子在裏面要曉得就是三年應試八千舉子哪一個不經主司類考遴選品題然後送入場屋偏有哪不識字的昂然竄入其中究竟頭場二場成百成千先借重在高牆之上況此女流做詩原不過是個名色今日總是余麗卿一時得意到極處心滿意足取興作景的事叫女妓應試倒做了一段絶奇的新文哪得認真個個是飽學就其中或有識得幾個字胡亂謅得幾句打狗詩的也少不得高興與名此試惟恐擯斥不録關在貢院門外就像如今挂名讀書的朋友僥幸弄得一名科舉恨不把科舉二字做個扁釘釘在大門之外寫個票兒貼在額角之頭然後臨場擺踱已足生平哪個肯自度自己的尊腹有也沒有然後來應大比女人略會吟詩便是樊素後身略會寫字即説蔡琰轉世即如古女博士女才子等類強半都是後頭的人標榜出名故此世上白丁居然冒稱詩伯若要象倚妝文娟弱芳這樣真正會做詩真正出色的佳人能有幾個較之那考場裏靠那傳遞代倩割面換卷的挨到下午日色西傾外頭的不得進來裏頭的不能湊手頭疼眼脹畢露醜態這一班人與倚妝等較之豈非相隔霄壤哉我又只見那真正讀書的秀才走進場屋裏去便覺文章聲色已減了一半要曉得試場兩扇大門是真有鬼的一關關了實是窘人思路你就此時低聲和氣老爺阿伯去求告東房西號要他點撥一兩個字只有討吃許多沒趣誰肯來憐憫幫襯你故此都要思量一個捷徑的法兒才好過得這鬼門關奈何橋去如今那些匱兒風穿條本裙子不曉事務高談闊論看舉人進士一發不在他心上開口説道子弟們何消得讀書花案奇聞做父兄家不著起早睡晚吃些辛苦做些生意買賣掙他幾花紋買了一個秀才再買一名科舉端正了路頭關節聯好了號房走進場裏去只要熬他三日三夜的辛苦那舉人進士不怕不一節打通象這樣容易爽快的封君太爺倒不去做反去靠那兒子哭哭唔唔讀這幾句臭腐時文苦挨苦掙豈非春夢妄想即使掙得到手我們又好半節入泥了還不得知他肚皮裏幾時將這七篇才塗得黑哩況且文章好歹那有定評有銀子就是好文章沒銀子任憑你錦繡珠璣總是嚼蛆放屁前頭這一番説話若不是老作家老在行如何見識得這般老到當有一個飽學秀才纍科不第卻被鹽商木客都鑽刺搶奪高中去了甚是氣了不過提起筆來寫道富而加教教以致富之方銀光就是文光窮不讀書書非送窮之物窮神終讓錢神今日幾百明日幾百一簿帳已勝過五車書今年苦讀明年苦讀萬株筆那如得一杆枰大凡官吏幾個是淹貫通儒一介書生到底到窮酸餓鬼清夜問天天乃粲然大笑曰此非我之罪也試問爾祖父讀書乎為商乎雖是憤悶不平之語然卻字字的真可為痛哭流涕説便是這等説殊不知他們鑽營的命運湊巧該破財發積就到臨期豈得不要吃一番驚喝受無數苦楚又恐頭路便正氣關節未便得到事體敗露身家中保你道可憐不可憐怎知得我輩真正潛修苦讀的人出之腹笥之中一字一句撿擇真金美玉寫在卷子上光耀奪人任憑他雷轟電閃還道是筆陳文光但只是如今世道淩夷斯文掃地上官不肯作興士子把考試當作一市生意原價多少新價多少憑中説合現銀交易即沒有現物若是居間硬掙肯把擔子挑起也不怕他花案奇聞所以如今的人越是窮鬼越要買中且中出來再做計較還有一説就是當事或肯認真振作要取幾個真正門生或是看文章的蒙蔽受賄或是房官出身原是坌路貨哪里識得文章好歹就是簇新的甲科雖宿負重名一登仕籍滿肚醃臢早已將本頭括貼丟到東洋大海還曉得甚麼叮冬他總有憐才的心腸究竟替那不憐才的一般所以苦讀的未必得中哪怕你真正去撞破天門懷才白首浩歎一生安得不把那一夥讀貨殖傳的説了天話去故此如今一科之中盡有那中式出來的還不曉得今年的題目是怎麼樣解的是那一本書上出的墨卷中就是記得一兩句四字相連的成語砌在裏面他偏去了第四字縮腳做一句懸之國門恬不知怪這是甚麼原故總是五顯當權文昌削職的時節錢神有靈豈但稱為家兄直可尊為阿父正是文章字字雖珠玉怎奈家貧大拂時滿世丈夫巾幗婦空勞筆舌費神思又有蘇東坡送李才叔詩説道平生浪説古戰場過眼還迷日五色人都説文場中實有鬼神把持不由試官作主要曉得這些貪婪試官已是活現鬼蜮哪里還另有甚麼鬼神此事是麗卿主裁雖然要秉公一番恐他胸中還有城府也老早有紅紗罩眼作小説的替他出脫不來停筆許久且看下面何如花案奇聞第四回喬禦史瓊宴辭魂詩曰今朝誰是狀元郎宴罷瓊林轉自傷報道嫦娥離月窟驚傳豸史入蘭房宮袍零落褫偏早旗帳摧殘掩得忙富貴不如平淡好花間何日再徜徉事必三思豈容鹵莽那才人感憤激烈之氣沒處發泄許你吟詠詩歌形之筆墨無所不至的譏刺當事也就夠了豈必定要見諸行事才算燥皮一場我看如今這些讀書的呆子只因錯會意了太史公自叔裏面兩句可為知者道難與俗人言便要從遊戲三昧中幻出蜃樓海市吐火吞刀必使見之者神散魄搖傾動一世然後咄咄稱快説也不信當初有一個奇人抱才不遇傀儡難平每向人前説的都是瘋顛大話竟把舉人進士盡著菲薄誰想這狂生瘋魔日甚不但止入四肢故此回到家裏日日坐在廳上糾集市中小兒數十著令拜叩庭下公然朝賀山呼萬歲道朕躬己嗣吾兄之位以妻某氏為皇后子為太子環繞小兒偽授官職如宰輔參政守備中軍名色卒至流浪顛狂究竟誕妄而死他希蹤上智之所為竟反同下愚之必戒真可笑煞引句相贈夢魂中紫閣丹墀猛擡頭破屋半間猶憶二十年前盛作賽神迎會必要爭相搜索妝扮一個絶奇絶幻的故事出類撥萃以驚耳目你道他有何高論竟想出一道文章來自扮做個察院監臨四轎涼傘儀從鼓樂擁簇頭踏面前又排列著書辦承差黃袱敕印其騶從規模絶類由布政司飲宴擡入貢院時的景況你説他惡毒得緊甚而竟把吾輩偶然不美手腳至於科舉不曾停妥的極法盡著描畫出來許多著了青衣帶著單紗頭巾穿涼鞋挂筆硯求告考的生員攀轎喊叫説道三年難得過懇求老大人作養作養收録進場一視同仁又有一起學那大言不慚的叫道今科解元還在場外苦聲極氣拚命都叫出來惹得一街兩岸就是致仕相公丁憂朋友無不切齡腐心即工遼祠禮之生亦假助其浩歎説道功名二字到此田地可謂剝盡面皮跌腳長歎之聲有如雷轟兵哄獨有憑欄觀看的玉女佳人個個笑破櫻桃正笑得鼻塌嘴歪的時節忽然撞著真正的官府沖將來訊知來由登時拿下這偵察院來當街二十大板一哄而散好不掃興要曉得凡事都可假獨有官不可假凡事都可亂獨有法不可亂裝官便吃官打亂法終為法制小説先生差了如這樣説起來那戲場上男子腳色終日扮皇帝扮宰相扮狀元女人腳色終日妝皇后妝夫人妝小姐為甚麼再沒有人去説他打他殊不知這些賤業榮妝都是那前世修行不到的墮落和尚班駁尼姑也叫做紅塵受用只好號為五霸假之而已間話且住單説麗卿考試已畢梁張二房共取中式一十八卷定了前後名次齊赴至公堂上察院的面前假意當堂又摹索比並一番拆開彌封第一卷詩春夜愁生枕畔孤春閨留月滿庭無思空架上書何限恨落胸中淚不無裘馬長衢誰氏子管弦中夜幾家爐妾生自許元龍傲不作乾坤一腐儒大座師提起筆來批道此卷神傾意豁絶不似閨中少婦口吻逼真佳品取冠多士第二卷詩詩多愁緒倚闌幹幾帙藏書強自寬柳絮入簾池影亂梅花滿地閣香殘一彎明月侵衣冷半榻清風惹夢酸芳草亦煩深戶鎖不知春色為誰看大座師批道此卷韻致琳琅豐情蕩漾擲地有聲無非金石
