天驚逗秋雨豈是無謂唐六如陶情山水間賣詩文不意此種曠遠高致已爲倚妝想到如此活計較之當爐沽酒抱瑟調箏者大相懸絕話說倚妝全虧水府送入宦門便曉得舟中義父不是別人就是前日處分花案的察院他居家正直無意爲官怎不使人傾心敬服但只是倚妝心裏總沒有一刻不想著麗卿故此悉眉不展又念著文娟弱芳不知飄零何處好生放心不下彼時易水在姑娘家裏已略有影響曉得倚妝出避的消息但不曉得其中這一段生生死死驚天動地的緣由一日正在書房中尋思含淚因作長相思三調拈之壁上其一調茶滿匙酒滿匙架上圖書幾上詩昏昏睡起遲花一枝月一池夢到關情人不知相思知幾時其二調風有聲雨有聲風雨無心愁自生蕭蕭夢不成度黃昏眼黃昏因甚月無痕陽臺何處尋其三調月也單人也單月影無聊人影寒愁來風雨殘別無端見無端別處誰知見處難風波頃刻間正在悲痛之際不覺身子困倦憑幾而臥忽聽得叩門之聲易水只得拭去淚痕啓門觀看卻原來是姑娘到此易水連忙迎接進來坐定姑娘說我聞得宗師已行牌按臨科舉想來孩兒本省已該科舉了論起理來還該回到本處應試但只是路途遙遠放心不下不如替你納個卷子就入籍在我這裏再爲童子科一試何如易水只因故鄉決難出頭正欲如此遂滿口應允即著蒼頭備辦試卷連赴府縣考試俱蒙取錄送道不隔得一月宗師考畢將魯昭取作批首又准應試入場到家歡天喜地姑娘設席稱賀自不必言到了七月初頭槐黃桂發舉子匆忙易水只得辭了姑娘竟往杭州應試又好取便打探倚妝消息拜別慈嶂即日束裝起身姑娘見他說要去科舉這是一樁美事也不款留隨即喚幾個老到家人收拾行李食物差撥蒼頭隨行服侍一同司茗出門雇了一隻船竟到杭州貢院前賃下一間小寓易水一到寓所哪里肯一刻坐定終日尋思探聽蘇州來往客人體問倚妝究竟下落正走到貢院前西橋直街上只見一個大香館在那裏裏面擺著許多的古董桌上放著一個好白錠的香爐爐內燒著一塊好香甚是精致可愛易水擡起頭來看見招牌上寫著蘇州香館四個字正中機謀就挨身進店假做買香的名色討得香目出來一看上面開載無數龍涎安息俺叭沈速西域夷香等樣易水介面閑問那店主人道貴處近有甚新聞嗎就是那前年余秀才的事可是怎麽樣結局了那店主人打著鄉談說道羅個余秀才事勿要提起儂害得介人勿淺哉個也鐵消話渠又阿是晦氣得勢撞著一個往蘇州經過個奢個官員曉得子奢花案個影響到子京通話個樣事又有那聽見個勿知個頭豬纏錯子話得價厲害兇險得勢真個是點水能興千叠浪電光惹起一天雲把個一班兒女娘都驚走子他鄉遠處去哉半點勿知下落真是個書呆弄出奢個把戲如今連余秀才也勿知走到羅裏去哉易水聽見這一番說話渾身好似水浸的一般冰骨死冷莫知所措呆了半晌一字不回紮掙回寓未離數步一跤仆地驚得那過往居民都攢做一堆來看認定是這相公必是吃酒醉了幸喜家人接著扶歸調治不在話下不知不覺又到了八月初八正要進場的時節還是帶著病只得勉強裝束進院聽點三場已畢衆人只見他哭哭啼啼不知爲著甚麽只有司茗心裏明白也只做不得知假慌做一團看起來西樓記中有一個泣試的于郎綰春園內有一個病試的場主總來哭也徒然不知他們只是要哭想這兩個人一哭畢竟僥倖得中還是會哭的便宜故易水也在這考場中學哭其試要曉得如今進場的那一個不哭出個苦水叮咚來此又是不濟事的膿包哭殺了也不中用我勸他不如在場裏嘻笑介兒東張西望的過了一日腔著投遞白卷只落得騙吃幾碗糙米飯拿幾個大饅頭回來爲閭裏光耀說我也觀場的天話也好易水此番哭了出場到得揭曉這日報子打將進來卻報中了第四名經魁可見人的功名遲早自有一個定數先年餘麗卿中了第二只因房師賭氣決要中元留到下科豈知又隔數年曆盡許多艱苦倒反中落了兩名今日既中免不得備些鼓樂馬匹往布政司吃宴易水正騎著馬行到清河坊一路想起前年宴上被按台來拿的故事又哭將起來跳下馬也不去赴宴竟路回下處叫些家人去收了鹿嗚筵席次日一邊打發家人回去報喜一邊勉強答應這些舊例殊不耐煩竟叫船回到衢州拜謁姑娘此時受賀開筵另有一番闊綽總是這些都不在易水心上過了月余易水忽然想道倚妝既已出外我不如趁此機會上京會試一路體訪有何不可易水一想想起這個念頭好象心裏火發的光景一刻也過不得隨即走到堂前對姑娘說孩兒身子多病不耐長途辛苦意欲早赴公車漫漫趲行還好耽延自在告過母親便好收拾行李即日起行那姑娘憐惜病軀再三勉留不得只得依他臨行囑咐甚是依依不捨惟願路途小區以慰遠慮若是再得僥倖聯捷端候泥金報喜當下整備船夫鼓吹餞送未免又有那一班是親非親的聽見易水要上京會試一齊上門肉麻拱闊勢利光景送到岐亭拜別便即掉舟長行一路唏噓日無寧刻正是山路崎嶇儘是悉腸回轉江流蕩漾渾如淚眼揮成不多幾時已到京華安頓寓所場期正未易水也無眼看書也無心拜客終日在街坊上東走西踱何曾見倚妝一些消息忽地癡心起來說道莫不是她們走出紫塞重關上西天去我不如竟趕到關外奔上西天情願不赴春闈欲窮日出之邦整備梯天之具但只是一說萬一關外多有攔阻天上亦生攔阻天上亦生妒忌那時空走一個周圍沒處去打聽真實資訊走得轉身又是遲了況我去尋她她亦必要來尋我萬一到在近地兩邊錯過卻怎麽好又想一想道他們止是風流小過有甚大事天必不替我作對人必不與她爲仇誠可格天真能泣鬼譬如今人到普陀山拜褥至誠到十分處一般也看見觀音大士真身出現的時節我只是耐著心兒在這裏密密的多方緝問就憑她地角天涯也少不得有尋見她的日子正是不將辛苦易難遇有情郎話分兩頭卻說蘇州按台巡了兩差升受京台正點著會試分房要曉得做執法的官既是光明正大做典試之主自然鑒空衡平的想他本房所取定是數一數二的秀才不期春闈榜畢易水中了進士本房就是前任的察院赴宴這日不覺又添了許多儀從決不把你象前日吃鹿嗚宴的時節半路上跑了回來正在宴上看見張又張梁思遠都各由本省中式各各聯捷今在席間相會三個且不說做了同年歡喜卻是哭做一團只問弱芳文娟消息若何我們去後事體怎麽樣了老弟爲何改了名姓易水細細告訴一番又張道千里同心真如鐵石我輩只爲情字羈遲夙懷耿耿愁緒悠悠直到如今不敢背約如今既又鄉會同年情趣愈密正好去尋訪消息以遂生平大願三個同叨兩榜聊慰寂寞可謂不幸之幸及至說到三位才女尚屬烏有先生卻有千般苦腦萬種熬煎照舊是幸中不幸以此面面相覷叫做流淚眼觀流淚眼正如斷腸人送斷腸人卻說遠思殿試二甲第二選了江南淮安府推官又張殿在三甲選了山東兗州府滋陽縣知縣易水中了探花考選翰林留在京裏梁張只得沒奈何別了易水吏部領憑各去到任一路訪問文娟弱芳下落易水在京裏他忘卻自已是一位官兒終日東遊西蕩只在街上閑串打聽倚妝消息不期一日正走得身子困倦坐在一人家門首只見一個篦頭待詔走將來喚易水一聲老爺說道小的是蘇州人流落異鄉做些低微手藝爺可要服侍嗎易水聽得是個同鄉就問他說你既是蘇州人緣何流落在這裏待詔道小的本貫原是徽州府一向在蘇杭做些賣買久往姑蘇習慣鄉談故此人都叫我是蘇州人只因消折本錢回去不成流落在這裏止剩得一雙光手趁活易水道既是你在蘇州日久何不趁便歸鄉待詔道別人面前小的也不敢說聽得爺的聲口象是同鄉口氣面貌倒有些象前一年那姓余的相公那相公考試甚麽女狀元正在那裏吃宴卻被本處地方一個光棍首告在察院衙門說他謀反大逆那察院老爺登時差兵拿獲幸喜沒有憑據他又預先不知怎麽曉得逃脫走了只拿得一個醉漢把他正了法其餘都不究起後來又聞得京中一個兇信說道花案人犯聖旨提拿驚得那日在席的一干女娘瞞著各家媽媽都是東分西散不知何處去了正是小的的晦氣一向小的原在他老媽處走動與他老媽相與的至交那老媽無可奈何特地央我趕到前路尋覓一路追尋蹤迹卻有些風聞消息只得順路隨行要求實耗哪里知道那三個女娘都是不會行船慣的一時風水不便都一齊翻下水去淹死了易水聽見他說淹死兩個字三十六個齒牙對對廝打直聲叫將起來說道她三個難道當真死了你又不曾尋著她的船如何曉得她死是實信待詔道這有個原故小的那日在飯店裏正好撞著她的駕長說起根由那駕長是個識水的他從水裏逃出因沒了船又無生意故此偶湊都在京中歇宿所以得知易水道你可曾尋著屍首不曾待詔道茫茫大水一下水就浪拍滔天的去了叫小的哪里去尋她倒反把小人一身也流落在此還可憐小人的妻兒妹子見小人不回家去又沒音耗回來只道小人是個薄幸的王魁尋著三個女娘抛撇妻兒老小另投別地快活去了連忙搭了便船一路趕來不料中途又被劫搶散失不知下落可憐水災盜劫接踵相遭既爲余秀才壞了媽媽一家又因余秀才坑了小的一家分明是一邊以風流考試將一班狀元榜眼送入龍宮一邊以女伴孤棲勾了我妹子妻兒同歸水府只落得小人單身無倚幾希乎做了一個鄭元和沿街求乞的榜樣出來還虧學得這件賤業趁食糊口不到寸言反依的田地易水聽他這一番說話又若又氣又慚又愧不敢高聲就哭也沒意思對他又不好把別樣說話回頭只得問道你今肯跟隨我嗎我不是別人我就是翰林院魯老爺余相公是我好友他累了你我肯認帳明日待我尋還妻子與你你卻意下如何待詔連忙叩頭說道低微肉眼不識貴人只求老爺收留小的終身有望易水道你既跟我你可認是我的舊役取名魯留義取相留之義不比流落之流易水心下暗想道怪見得我尋來尋去尋不出一些消息倚妝既爲我身死我怎肯負彼深情寧可斬我宗祀此生決難再娶一徑帶了魯留同回下處才敢放聲大哭一場就設立一座牌位供養對面擺著兩張椅子每日三餐好象對活的一般同吃同坐替她說一番對她哭一番淒淒慘慘好不傷心還哪里數得著荊釵記十朋祭江南一套北一套絮絮聒聒一日易水歎口氣說道人生在世上一個妻子也還消受不起還要妄想做什麽官待我明日入朝上他一個給假省親的本兒無論聖上准與不准且回家去一路也好尋覓倚妝骸骨日後也好替我合葬一處難道生既不能夠與之同衾死又不能夠與之同穴不成萬一沈坦日久不能識認出來無窮之恨如何是好我魯昭不但終身不娶終身也誓不做官的了到了第二日五鼓正當早朝時分易水果然上了一本聖旨倒下幸而恩准給假一年假滿還朝敘用連夜起身回來正是愁成不覺淚珠流拭淚焉能拭我愁哭到斷腸天欲裂宮袍何事苦相留倚妝孟浪舟逃激就一時癡想媽媽倩人追訪徒然日夜牽腸勢所必然情所必致但待詔被盜一段緣由不知是真是假我曾見那徽州的風俗男子慣在外方生意幾十年不轉家鄉或有新婚離家白首未歸的或有子幼相別到老不見的那曾見有妻兒子女終日奔波往四方尋覓的事還只是他一向住在蘇州習慣了蘇州空頭的口談來騙易水也不可知見得我是個無妻無子的人又沒本錢又沒靠傍是治歧必先之人爲嫂溺必援之事那知正說向真正餘生安得不收留帶挈但只是餘生試花逃難尋花棄職未免一生結果都在花業裏頭此亦是人生第一件絕大暢快事情但不知相逢何處耳依我打算起來多少詩雲子曰才博得脫青挂綠卻被一個模糊情字竟慨然准折過了世上哪有這個癡子易水業已爲之再看下文可也
