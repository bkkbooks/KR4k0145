body:
  text: 第三卷詩閑步春階春意馳春風春雨亂春時相逢柳葉窺人眼何處梅花入夢思只影曾憐雙袖薄孤燈應恨獨歸遲閨中寥落應惆悵雲樹依稀可是詩大座師批道此卷清新秀逸不減開府參軍未易多得第四卷詩春來羅帳曉風生被底留寒夢弗成幾卷殘書消漏點半輪孤月伴愁城鵑啼未語腸疑斷柳眼初開夜欲明受用深閨長寂寞卓家何處認琴聲大座師批道此卷珠璣錯落滿紙淋漓疑是隴西一流人物第五卷詩九陌風塵一望孤接天芳草遍姑蘇閨中清夢知多少客底黃金問有無百里平湖浮野鷺五更殘月聽啼烏只憐空負花前約春酒如澠懶獨沽大座師批道此卷奇思磊落一洗脂粉陋套殆非凡品其餘一十三卷都批了取字中字選定次日傳臚職事官捧著金花袍仗鼓樂站立伺候當日衆姬齊集門外聽候揭曉這個光景好象當初唐中宗幸昆明池群臣賦詩的故事殿前結一座彩樓從臣悉集其下須臾紙落如飛各認其名而懷之單取宋之問不愁明月盡自有夜珠來這一首即令上官昭容編爲新翻禦制曲今日衆姬雖非真正應制卻也相去不多衆姬在門外遠遠望見堂上的人坐的坐立的立一族人清清潔潔不挨不擠甚有規矩只見卷子已是拆完傳臚官高聲唱道第一甲第一名倚妝上面接連的唱了兩聲倚妝明明聽得叫她的名字不敢就應直等上頭唱了第三聲方才底聲應道在只見一班兒伺侯的女人如飛一般跑將下來把倚妝推將上去隨即替她簪了兩朵金花換了袍仗披了一段血流的大紅俯伏在那丹墀之內上面又道第一甲第二名文娟第二甲第三名弱芳第二甲第一名湘容第三甲第一名小淑諸進士謝恩已畢其一甲三名賜進士及第其二甲六名俱賜進士出身其三甲九名俱同進士出身即著鼓樂儀從隨狀元倚妝帶領了諸進士一齊瓊林赴宴但見鼓樂喧天帶宮花飲禦酒全不是玉街上那得意的青氈彩旗蔽日騎白馬跨雕鞍卻好似金屋中那喬裝的紅拂爲甚麽也效瓊林賜宴只因風秀才特典憐才卻原何也學金榜題名總是呆公子揮金撒潑卻說女狀元倚妝同了一班兒女進士軒軒昂昂各騎著金鞍白馬張了一把黃羅涼傘都到宴上來只見上頭坐的是大總裁兩房考照席陪的是監臨禦史兩旁是一十七名新進士中間高結起一座五彩百花樓樓下搭起一條仙橋歌詩奏樂大吹大擂好不熱鬧齊整只這一席的大宴不知哄動了多多少少的百姓老老小小男男女女都來玩耍觀看正是不道賓興能駭俗卻傳花案是新文卻說地方上有一個大光頭棍專好殺人放火嫁禍生風他的面貌和得好不兇狠怎見得但見髭須長長短短好象不曾裁就的牙刷眼珠凹凹凸凸卻是未經磋光的彈子舌上鋒生不數莫邪幹將心中毒起強如蠍口蜂針這個人卻叫做甚麽名字他是蘇州府第一等有名好漢混名就是柳貔貅你說怎麽叫做貔貅天下世間最凶最惡無過只有山君老虎殊不知這貔貅又專吃老虎所以古來比那兵馬的威勢叫做百萬貔貅正見得沒有人可以抵敵得他的意思那柳貔貅平日間大模大樣走到街坊上來哪一個大大小小敢不去奉承著他只有這些讀書的阿呆是天不怕地不怕鬼神虎豹都不怕的偏要在虎嘴上去撥須龍口裏去挖珠拚做這頂頭巾不著擂鑼擂鼓趕到前路只是光棍吃了些虧常常領了筍乾出去輕則筍乾散火重是獨桌相邀故此貔貅也只是讓他們一分說道做朋友的人就是極柔懦殺後頭總是量他不定芥菜籽常要落在繡花針眼哪里有磨大的眼睛看得後頭見的但只是餘麗卿做人又是少年又極狂放比別人便更來得昂藏無數專喜的是鋤強削暴不肯饒人雖則不間計較貔貅那貔貅實是日夜彷徨氣他不過故此終日要思量尋些罪過就擺佈他怎奈他是一個有名的朋友況且是世家的子弟又有銀子使用上官當道未免都是同年故舊料道些小事情算來弄他不倒殊非是謀反大逆株連三族這樣大題目才好捉他的破綻一跤跌倒要曉得這些阿呆們三三兩兩聚在一起所在原沒有甚好事幫將出來不是打人罵人就是使酒撒潑若要他們去做那樣滅門絕戶的事斷斷不做的俗語道秀才謀反三年不成恰好這風流罪過正中在貔貅在卵眼裏他就生出一個計較裝成一個大大頭腦說他謀反叛逆私設官僚竊效賓興預結陰黨竟到察院門前擂起鼓來你說貔貅忒也膽大萬一準了他拿獲將來當堂審出真情並無實據豈不要反輸一帖這又有個原故他他意中道秀才們做事敢作敢爲開眼著賊明明讓他幾分至於妓女娼流只合藏頭露尾如何假冒生員科舉應試問他奉何新旨擅假官吏開科就當堂審出真情雖無法物可據卻有那些妝扮假官的行頭可證這也就是違條犯法的事饒他叛逆一定招誣如此如此算得千停萬當方敢放膽胡行不然就算爲得個貔貅手段俗語說得好一不做二不休除了無常斷乎不丟卻說那察院老爺只道有甚軍情緊急慌忙出堂開門抓將進去原來是一個告狀的人惹得察院老爺怒氣衝天且不問他的曲直竟把行杖之簽悉遞門子之手總而計之該打八十打完訊問豈知這貔貅祖上忝在竹山傳家已是久成鋼的傢夥那怕這幾個搔著癢的筍乾打將起來磕頭不已大喊大叫道地方謀反大事小的如何不冒死稟明就是打死小的還望老爺詳察那察院是個爲地方百姓的真正好官就是當初包待制亦不過如此怎見得他的好處他正直無私勵志專圖執法清廉自守堅掭不畏強梁故此振聲名於天下獨揭銅肝因而總憲度於朝端威形鐵面允矣萬民保障誠哉庶職權衡彼時察院聽見他說地方謀反四個字卻也關係不小即喝令拖起從實說來又對他說道謀逆重情非同兒戲身家性命只在頃刻若無確據希圖陷害良民你看本院是何等衙門三尺無情立時就反坐了那貔貅不慌不忙一步步膝行上前輕輕的稟道小的怎敢掉謊現今本處有一個余秀才喚名夢白家資巨萬暗結凶徒舉動不良久懷異志只因未有實據小的也不敢輕易出首如今他現在彼處明張榜示盜竊名器大集黨徒號令歃血委實反情已露方敢據實報明切恐一星不滅得致燎原小的若只愛惜自己的身家畏縮不首連坐地方還不打緊卻于大老爺衙門縱逆容奸大有幹礙伏乞速速整備兵馬趁他事情初起人心未歸出其不意一併擒拿急急剪除庶無後患悉聽憲天裁度小的若有虛情聽憑大老爺加罪之後再複處死便了察院聽得這一片胡言想道既責八十之後卻又侃侃而談言之鑿鑿決非無因也覺得被他聳動即時密諭兵巡道帶領官兵徑到餘家門首團團圍住連察院自己騎了一匹飛馬跟在後頭一聲大喊搶將進去誰料麗卿正在席上吃酒突然機動心裏有些不然豈有身居庠序名教難寬爲何做這孟浪不經之事一霎時如坐針氈已覺十分不安穩了只聽得門外人聲嘈雜馬蹄如鼓想來不是好局必有非常陷害之事此時不走等待何時速忙把遠思又張一扯同往廳後一跑開了夾牆小門跳過牆缺急搖急擺望城外一道煙走了當時三個秀才商量各自分散奔回原籍不提好笑麗卿一團高興費了許多銀子如何不打聽一個明白輕輕的竟自逃席去了假使不是當真來拿他的豈不把倚妝笑殺看得麗卿原來是一沒擔當的呆子只恐從前的盟誓就要翻悔掉了我道豈有此理決要曉得讀人後頭若有一步進身就到那患難迫促之機自有鬼神呵護決不把他那個身子死於非命不然後頭這一段結果更將著落何人這也不過是老天因他的後半故此偏心愛護他的前邊反惹起愚夫俗子一種勢利心腸專以成敗論英雄矣故此麗卿來到臨期先已心動正是天地鬼神默佑他的所在那中庸上說得好動乎四體至誠如神你說貔貅與麗卿日常間原我仇隙又無口角不過書呆舊樣讀得幾句書在肚裏見了小人略覺妄尊自大這也是盤古至今無可醫的病如何他就積恨含仇下得這般毒手總之古聖人說得好滿招損謙受益這六個字當銘諸肺腑是我輩養身惜命的本源這般亂世豈是我輩是志的時節何苦再不肯自己保重身家偏要搖擺把這廝視爲仆隸自我論之在他不消奉承得我在我也不必去淩爍得他平平常常水米無交的過去是第一高著麗卿早識此言決不弄出這場把戲卻說兵馬進門但見許多酒席都是空座上有一個戴紗帽穿獬豸補子的老爹坐在照席上已是吃得盤空碟淨醉醺醺不省人事的還在那裏叫斟大杯伸出幾個指頭望空替人亂豁拿三道五喊叫如雷卻被官兵族擁拖翻一索綁起驚得那些女進士戰戰兢兢看見勢頭不好拖著花紅帶著袍仗一齊奔散偏生腳兒又小性急越走不動慌慌張張一步一跌將去了只求躲避得過便謝神天你道甚麽要緊但見喜宴初開一霎時張弓挾矢宮裝未卸傾刻間棄甲曳兵窈窕三元那討得揚鞭得意蝦楂禦史只落得拍案驚奇豈非樂極悲生正是福兮禍倚察院大人周圍一看只得一個男人其餘都是女人東歪西倒觳觫妖疾又沒有一些器械贓證胸中揣摩不過是書生挾妓徒爲豪舉朋謀聚逆決無是事因此不究來歷吩咐不必株連即時傳令回院毋得驚動地方只拿現獲假官一名也不拷訊竟將一造龍須大板打個不死半活你這這老焦一頭褪下褲子一頭還討酒吃亂叫麗卿不要如此取笑幸而乘醉受刑未肯就死當場複取三百斤樣枷套上標著神褌假官立枷一月只正他一個假扮官員的罪過隨即簽下安民大榜曉諭諸民一概餘黨都置不問你說既打死了一名犯人業有形迹如何可以根究餘黨這是察院老爺明明曉得是一班書呆們作景設酒聚歡故此男女混雜不該冒竊了朝廷的名器所以只得把焦彥貴置之重法那柳貔貅也招不得誣罪其餘姑置不究總是按台一心只要安靜爲主因上不加株連真是天地父母居官仁愛之心借一儆百的道理只是焦老爺既入羅網不得不借重做個焦頭爛額的上客了正是閻羅注定三更死定不留人到五更可憐焦老官一旦風光化爲齏粉挨不到第三日嗚乎哀哉伏惟尚餐隨後他妻子母夜叉知道丈夫身死細探情由知爲詩社流殃冒官速斃隱恨於懷遍訪這班創典的文人隨會的女客希圖報復哪知這幹人恐防株連預自潛藏一時何處尋覓因此漸漸冷淡去了姻緣未就遭磨折鼠蓋高蓬腸欲絕席散筵飛驚醉顔掀天塌地加霜雪我甚憐焦彥貴才陪瓊宴忽然身殞可見小人連這假筵席桌面都不能夠安然享受只可恨驚散了簇簇狀元趕走了一班新貴卻可恨這母夜叉竟做出那續梁山的手段實是焦夫人變幻不同作小說家靠他伎倆又騰駕起許多雲霧第五回駕薰風背地興波詩曰雖然南北不同緣桂窟生涯亦自妍混沌分時原有竅應教鑿破個中天從來美男姿色如宋朝子都彌子瑕一輩都是南風的宗派後世有要從背底營生者自當供奉三君子事如神明屍之祝之然後可指望尾閭川流駝峰山壓取之不竭用之用餘所謂取精多而用物宏耳照明如今的梨園都奉什麽老郎爲優祖你道老郎是怎樣一個人物實是一個嬰兒的塑像想必他生前原是小官出身死後升做老郎的凡中各腳色裝扮完了先要到行頭箱上奉老郎深深一個肥揖方才方場聲音響亮舞蹈自如不然老郎就要裝腔做勢起來等你開口不得口動不得手露出馬腳一場笑話竟不知這樁典故從何處得來據我胡亂注解想必老郎原是小官究竟故此把小官便認作老郎又聞閩中有一種叫做榕樹凡有小樹生長在榕樹前邊那榕樹必要曲拱老幹斜撲著那小樹勾搭著了便把枝柯緊緊的纏住在小樹身上小樹也漸漸倒在榕樹懷裏兩樹盤結刀鋸不開因而顧名思義就取名曰南風樹樹既奇特名複典雅要曉得最無情的莫如草木尚然做出這般榜樣正是草木多情尚如此如何人肯不云云近又看無聲戲中有一秀才以千金聘娶一個孌童花燭合巹儼然夫婦後因此童年紀漸大欲竇盛開恐怕相聚不久又慮紅顔衰落日夜抱持涕泣此童亦深體他憐愛已到極處無可表著自己的貞節忽然想出一個妙計來暗地裏自加宮刑竟將一把利刃割去翹然之物情願做了司馬遷自下蠶室你道這等交情還數甚麽同衾同穴後來又因衆朋友中不慊氣他獨佔尤物就乘他閹割的名色出首說私弄宦官弄得家私罄盡直到此呆物故他還終身扮作女裝柏舟自矢替他撫養前妻生的兒子後來其子發了科甲尚不知撫育之恩反出龍陽之手有情如此安得不借重庠序相公動張公舉旌獎門閭以垂不朽要曉得人生在世豈無好尚意南而南意北而北任憑那欲魔注定只這一點念頭就是有回天拔山之力萬不能夠牽轉他的了今我有個譬如譬如美女佳人只好貯之金屋謂之房稿可也孌童可兒正好隨我四方謂之行卷可也如今做秀才的人那有唯讀房稿不讀行卷之理況且兩榜人物行卷內文字好的然後想他的房稿抑且論起理來老天既生出人這兩樣東西同歸于妙原不曾叫人只取一樣的我見如今的人好走後路的不惜身家不顧性命比那走前路的更凶十倍但不知此中意味何獨深長至於如此之極正是只爲後庭能遣悶不因紅粉便忘憂話說梁張二公當初在虎丘寺裏戀著一個天下聞名的小官王子彌分明是宋朝轉世彌子後身又與那大來頭和尚叫做三茁一同在千人石上飲酒時節相約餘麗卿探訪花姝不期這日梁張二人撇了王子彌不帶他去那知正中了三茁這賊禿的機緣便宜行事那三茁呵挂名佛子寄迹緇流專走南北兩行酷好陰陽二妙假斯文吟風弄月認爲佛印前身真大膽飲酒宿娼賴做濟顛再世大抵萬法同歸獨此居然第一那和尚原與王子彌兩個是莫逆深交情同夫婦那日在席上見他替幾個朋友猜枚行令勾腳撚手已是心裏十二分不樂原有些酸缸發作醋甕將翻的光景當時就要思量發作起來只因在席的都是些相公無可奈何勉強含忍滿肚皮只要他到寺裏來的時節當面與他廝鬧一場也好戒訓他的下次不料到了第二日影也不見子彌三茁甚是惱恨不過只得跑到他家裏去尋他家裏回報說道絕早有人來同他出門去了問他到哪里去卻又不肯說三茁疑心道是了畢竟被昨日這一干人相拉去花街柳巷走腳通風去了氣得三茁跌天跌地叫屈叫苦說道畢竟小官沒主意這一班阿呆你可是親近得他的如今的人不曉得好歹只說道和尚是不長進的殊不知這些阿呆更比和尚又不長進些那老天已生了這樣絕色的女佳人把你們終年終月終日終夜的弄聳又可恨認定不許和尚粘著他們的身子就是和尚背地裏相處得幾個歪貨好象做賊的一般犯將出來是人是鬼個個詐得著難道我們做和尚的就不是人生父母養的不成因此這個老天可憐見說道和尚雖系出家卻與俗人一樣他身上並不曾少生些甚麽既具了五形便有了酒色財氣四件若說和尚不該擅動色念就不該把他生這個東西既把他這西又不許他動起念明系是誘人犯法殊不公道所以老天還有情分分下一個南北兩路來也明放和尚這條生路故此生出這些美妙男兒專付僧人權爲妻小那曉得這些無恥的秀才偏要撇開自己的老婆又來與佛門弟子分奇貨想來天也難容豈非既得隴又望蜀嗎好笑這個癡和尚總是不明道理的說這美少年原是天下的公器天下之物當天與天下共之況且既不識羞做了小官自然樂與文人尋花問柳豈肯守著一個光頭尤可惡者光頭沾著色字不論男女便要做些故事拿定是不歇不泄的女人之所甚樂未必非男子之所甚苦還有一著一般婦人養漢被人恥笑至於與和尚一頭尤爲人所鄙賤說道怕沒人相交偏要去打和尚抑且要做小官的守著一個萬萬不能幾曾見貞節牌匾輪得著小官身上就使覃恩特典如有小官不濫此道者一概准給貞節也斷不許戀著和尚的小官濫叼貞節的劄付就是和尚刮落的小官被相公弄弄于和尚的體面有甚損傷傷必逞兇懷忿好象殺他的父母一般這等傷心一日三茁正在閶上婊子家時踱將出來劈頭撞著王子彌一把扯住便開口罵道你終日同這班書呆走有甚好處他不過多得我幾根頭髮卻趕不上我這一身風月我與你相處在先你豈不知道我的此物嗎鬥粟不垂金槍不倒百尺竿頭盎背木樨花窟生香滴幾點之菩提從此元通妙術傳斯頁之缽杖而今了悟無生我非托之空言爾豈忘諸實事那和尚半說半罵把王子彌搶白了這一番那閶門外是個來往通衙五方雜遝的所在王子彌儀容一表衣冠鮮麗流名天下舉國若狂那些贈詩求賜的門外撞踵求一睹面而不可得者不知多少就如當初入李膺之室者號登龍門今日想慕王子彌的鳳穴而入者比那登龍門的更難十倍故此子彌才交卯運的時候正要結識朋友相處名公就是與三茁相交不過是背地偷情來往就如今日娼妓人家明公正氣開著兩扇大門招接四方獨有和尚也不兜攬如何子彌肯把人曉得作承那禿驢三茁即有曉得的無非是三尊大佛五百尊阿羅漢恰都是些不肯管閒事的好好先生故此才不隱瞞他今朝王子彌把這禿當街出醜氣得他粉面通紅柔腸百結淚痕初落宛如秋露滴新蕖眉影微攢卻似春山凝遠黛王子彌心中暗忖道這禿廝直憑輕薄可恨之極不若早早開交方出我心頭惡氣又想起道就是前番梁張二公卻也好笑特地約我去訪探花魁臨期公然撇下我也只道這些書呆們不過一時間高興寄之空言未必行之實事那知他們竟弄出這樣大把戲來我幸不與名此局還是我的造化不是我王子彌誇口說就是遭在裏面那怕三院司道正印衙門的名來拿我縱來拿的時節我自有法兒消解不象那廝不濟事的秀才就要央情解釋只恐還沒處下手哩我當日舉進京的時節哪個司道官兒鄉紳大老不來送禮逢迎就是各營頭將領也都來祖道餞行我如今雖做小官的閑住在家那些現任父母公祖都可以名貼往來不如央個能事管家送一個貼子到蘇州府去講這和尚酗酒宿娼他的不公不法把柄甚多我已曾都細開手摺哪里還論他平日的交情就是當日燈前月下設盟發誓這不過是從古來的舊套子實從脫空經抄寫下來何曾是我的當真心事便翻悔這一遭兒卻也不礙我生平名節商議停當公然坐了一乘大轎擡到本府太爺賓館坐下著陰陽生投遞一個治下晚學生的名貼說要面見太爺的又送陰陽生一個常例紙包吩咐就稟一聲你道官府衙門傳書貼是個將命之人如何取名叫作陰陽生或者晝陽夜陰是晝夜走動的人或者內陰外陽是內外關說的人總之此輩不是陽物就是陰物也不消去窮究他要曉得從來做陰陽生的都是那些退氣的門子降點調用的恰與王子彌比並來都是舊日同僚況且子彌又有常例送他不過要他投得一個名帖稟得一聲要見如何不殷勤奉命即忙走到轉鬥邊替他傳了名帖正值太爺要出堂公座投入簽押事完便叫陰陽生問道這位姓王的鄉紳是甚麽樣出身爲何我本府憲綱冊上不曾有他的名字陰陽生不敢隱諱把他的腳色從頭念將出來說道他是個有名的龍陽出格的戲子一向在京師裏行事近被科道糾參趕逐出來閑住回籍爲此各衙門老爺一向優禮他俱用名帖相見原不曾入在憲綱冊內太爺喝門如今這廝要見本府何用陰陽生道他現在寅賓館裏說要面送什麽一個舊相與新惡識的和尚太爺聽見這句話便激得他怒形髮指著令拿到堂上來只見許多皂甲跑賓館裏來對王子彌說道太爺請堂上相見那呆小官不識起見也不看個勢頭曆只道還是好意思慢慢的裝出官腔一搖一擺踱將過去叉手施禮太爺高坐公大喝道好個大膽的奴才見了本府還如此放肆嗎子彌正要開口卻被兩邊皂快聲吆喝起來驚得他魂靈半不附體縮做一堆太爺道你將後庭獻媚喪盡廉恥輒敢在我法堂作怪憲廳行妖把醒子在案桌上亂拍亂敲丟下簽來先打三十兩班皂快登時拖翻捉頭捉腳褪出妙臀卻與那奉承大老慢慢脫褲溫存搽唾的光景大不相同這些皂快見了子彌白嫩美臀光柔佳器哪里便忍打將下去猶如小官們初破那種光景哀哀的求道小的實是害痛饒了這次吧太爺回想道這廝不經敲打我若登時斃之杖下反爲他遮隱惡名不若出幾角文書申投院道歷數他大膽無禮的所在將身肆害的原由把合郡做小官的看個樣子庶使龍陽無種狐媚除根未必非仁人君子之用心也因叫左右將子彌暫時帶起鎖在一邊聽候發落太爺又詰問道你這奴才今日到一府來有何話說子彌受嚇驚戰一時答應不出停了一會說道小的只爲淫僧背恩反噬當街羞辱憤他不過只得奔控台前不期冒犯爺爺伏乞詳情恩釋就是那假官使吏花案一宗也都是這和尚挑唆撮合生端事的太父便問道那和尚叫甚麽名字如今住在那裏子彌又稟道那和尚叫三茁現寓虎丘寺中是江湖野僧不知籍貫居址太爺一面就出簽拿三茁一面起角文書要將和尚小官兩個一同解到察院這也是和尚拐小官的現報了正叫做惡人自有惡人磨磨到頭來沒奈何但凡說起和尚就是作孽的多了獨說他這種好色的情狀喚他做色中餓鬼四字是極切當的俗語還摹寫得妙說做和尚的三日不見婦人看見鼓大水牛也覺得單眉細眼故此千謀百計生出多少圈套來瓷其漁色構淫之念必須哄動得那些青年的淫婦人捨身的女菩薩赴會聽經修齋寄庫這就是他的機緣湊合時運亨通了這還算不得暢意還要打發徒弟四處佈施或拖索拜石敲梆擊板高聲念佛沿門叩首托言某處起建某寺某處裝修某佛只要鈎引得到彼處不怕不成相契近日有一處地方新到一個清正巡道老爺初下車來即遍張告示嚴禁婦女不許入寺燒香怎奈惡習既久還難除革法令雖嚴往來如故這位老爺妙得緊不時差人在外探訪一日探得一個寺中有無數婦人正在那裏結黨念佛登時報知道爺那道爺佯爲不曉帶了幾十起重犯囚徒徑到寺裏當佛殿中間擺下一張公案公付皂快將和尚房頭後門盡行封鎖然後逐件件挨審過去那些婦女見官府來一時回避不叠都躲在和尚房頭不敢做聲只等審完回去不料審到黃昏才審得一兩起事那婦女原來都是些大家妻子鄉紳眷屬斷沒有在寺裏過宿的道理只得約齊各家僮仆去當官稟明道爺說我已曾嚴禁在先如何還有不遵法度的擅敢犯禁況今日這幹人犯是要緊重囚本道必須誓神公鞠況這些無恥婦女既歡喜與和尚打夥便多擱幾時也省得來遲去疾兩下裏背後相思今且安心待我公務畢時自有發落那些家屬聽得這句說話越覺心上著忙不知他有甚計較出來等過更次只得又去哀求道爺大怒將各家屬必盡數驅逐出寺門之外叫出合寺和尚都上殿來除去僧帽禿著光頭脫得上身赤條條的搜出一個婦人把一個和尚駝將出去駝到寺門外交割各婦家屬認回弄得一場大沒體面只落得和尚燥皮把一個孤老臭的光頭親親的擂在兩奶中間十個手指頭牢牢的挖著兩腿縫裏還有婦人那要緊去處緊緊張開吸著和尚的尊臀一步一顛顛將出去駝得健燥的又趕進來找零無所不至的插科打諢這都是那些前世苦行的和尚修積來千載奇逢那時節寺外旁觀之人拍手頓足大笑大樂沒一個不思量弟落了這兩根頭髮出家做個和尚自此之後才方斷截得這個燒香的路頭放落這燒香的心事就是這樣還有那不怕事歡喜和尚駝的暗地裏瞞了丈夫要偷去燒香念佛你說和尚有什麽好肚腸撞著一個婦人毋論好歹空中摹擬足足要想他成年成月若說到南風一道越發是他該得的口食了但只南風家數亦有幾等有一班兒與和尚泛濫不堪的和尚反做作得無比定要撿精擇肥有一班兒高擡聲價結交上客的和尚偏要鑽頭覓縫百計求謀不到手不歇若說爭風廝打劫奪施行真正性命不顧究竟兩敗俱傷總之以色中餓鬼四字批之未有如此之確而當者也這番三茁與子彌那堪經太爺押解察院正是命蹇似同褫殼鼈魂飛已是落湯鵝鞠躬盡瘁今方已俯首彌陀可奈何此時小官原告雖已拘系在官和尚被犯尚未拿獲到來可惜這位太爺是個亙古頭老實主兒忍下得這般毒手想斷然不是好此道的人了萬一被這禿聞風脫逃那時難道獨要一個小官頂肛不成作小說的反替子彌懊悔起來早知道不闖窮禍也罷第六回飽齋僧當堂獨桌原書第一頁佚那知你生平只消做一件傷腦筋動骨之事將這些好善的虛文那敵得過行惡實際此人是天有漏之因雖多方奉佛有何益處怎奈這些執迷不悟的貪癡到底招得這班佛子一發軒張要銀錢就是銀錢要齋糧就是齋糧要蓋造就得蓋造要裝修就得裝修那些法兒生髮無窮有時生髮盡了倒反怪那數間的殿宇如何尚未傾翻兩旁佛像怎麽不遽跌倒以致施捨無因化緣無籍此輩設心何等險惡假如今貧儒寒士無可控訴的即欲向朱門乞其銖兩即欲向慈悲望他拯濟悉屬鬼門問卦何曾有百求一應反添了許多憎惡不堪但只是有一班人學和尚之搖尾而不得者皆系猥瑣下流非吾徒也蓋是貧非病寧憎無憐吾惟不食嗟來之食雖至死而不變斯其人爲何等哉要知作福者未必有功而作孽者定然有報朝廷立法原只是空空的著成一部愛書並不曾扯人下來試試我的法看如今的人豈不知禍禍即在現前偏生要鑽到這法網裏去臨期懊悔有何及乎這段光景就象漁翁捉魚的一般當河中間置一篾罾那魚兒偏喜悠悠揚揚遊將進來觸著機械急要回頭已是遲了斷斷遊不出了可憐朝泳江湖夕存鼎鼐只好供人咀嚼而已昔有判僧尼一段公案說得頗確其略雲無君無父曰僧曰尼剃發作生偏多青翠披緇出俗頗染脂香掉三寸不爛之舌平地興波摩一對大小之頭藏奸表裏才入富門連聲菩薩一登宦室百口彌陀一串念珠爲活計幾張疏簿作良田數說輪回報出報應愚惑些老媼嬌娘更有不言隱事啓發盡童男稚女無非詐騙爲媒油豈燃燈爲佛竟資炮炙之羹米將作飯爲炊兼奉膏粱之豕知妖察祟身誇佛老之靈饒舌鈎言心蓄大蛇之毒釋名而賊行呆呆世上之懶民朋奸而共欲直是色中之餓鬼誤人壞俗彼既廢呼其倫毀刹焚經我當處之以法急置重典斷難輕赦話說那三茁和尚一時恨恨不平把王子彌搶白了這幾句只望他回心轉意照舊相交豈知竟成反目悠然而逝不惟悠然而逝驟然翻轉臉來竟到府堂上降下這一天大禍那和尚還昏頭搭腦困在鼓裏且自在街坊上閑行擺踱連自己也曉得爲著甚事這般精神恍惚且去簇新尋了一個淨室搬去住了叫做二即庵他本好色之徒倒取色即是空空即是色標榜本來面目那淨室如何幽僻回山曲水人迹稀疏修竹茂林鳥聲接續他也不揣自己文理不通杜撰一對門聯貼在靜室大大的二十二個字道三百六十日和而不流一年四季中尚亦有利大抵和尚清閒無事未免胡思亂想每想到微妙去處不覺興致勃發起來就要無所不至的形容出來你道他對聯對子中藏和尚兩字一聯是好色要不泄之意一聯是貪財要不空之意一日三茁坐在庵裏又寂地想起說道我當初住在虎丘寺的時節曾見那些遊山女客朝夕盤桓好象玉女臨幾天仙下降個個千嬌百媚人人似玉如花好端端我這兩隻眼珠生刺刺常被她們勾去但只是望梅而已終不能止得渴來畫餅而已如何可充得饑來似我這般做和尚何曾看了甚麽經何曾念著甚麽佛終日綾褲羅衫搖進擺出到晚來荗厭飲極欲窮奢只有這件要緊東西煞是可憐可恨到那危急之處無可奈何只得將這幾個嘴鼻子孫湯風抵浪也只好先叫他們洗刷乾淨曲躬靜待我把平日所心慕的不拘是男不拘是女觀想一人移花接木借此作彼而已就是東鄰西舍人家何嘗沒有婦女何嘗不與小僧往來卻都是些平常粥飯這樣的貨物也還不知費了多少的心思用了多少的錢鈔挨了多少的時日吃了多少的驚惶才得到手況用那肯打和尚的婆娘又偏有許多認色滿頰油光三寸面皮三寸粉渾身漆黑一人行貨一分錢身邊帶了一個海葫蘆恨不得將我們做和尚的不拘大小一齊都要收拾在內不露一些影響才好那如得梁張二公所見的倚妝文娟弱芳一班兒這等俏麗我爲著她們也不知虛空摹擬害過了幾十場單思大病咽過了幾缽頭沫唾涎津睡夢間也不知錯認爲幾百遭徒子法孫暗地裏也不知錯叫了千萬聲寶命心肝就是醒時節也虧我挨過了幾十次的黃昏夜雨月朗風清真個爲她死邊得活有苦難言幾首羅老子即日具請近聞得她們裝嬌做勢難以圖謀況她們結交的都是大模大樣極不濟的也是在庠的相公動輒要將和尚揮拳鑿栗如何敢虎口撩須故此忍耐到今如今聞得她們爲花案一事焦彥枷死在察院門前餘麗卿已經逃竄別處並無影響打呼得那察院老爺仁寬宥只處死焦彥貴一人餘黨盡行不問那倚妝等情癡不斷還在那裏思想他們我