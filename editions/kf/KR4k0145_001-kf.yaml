難問運落風波夢亦驚那和尚虛心病發陡見這般勢砂如何不怕死命千求萬告掙脫要走卻被媽媽緊緊扭住胸襟死不放鬆叫道淫僧指官局騙望大老爺青天正法察院老爺雖是堂高路遠卻如空穀傳聲聽得叫喊聲音即時叫那巡捕官外邊甚麽人大膽只見幾個牢子手趕將出來把婦人和尚一齊鎖將進去察院老爺問道那婦人叫甚麽名字有何冤枉扭住這和尚敢來本院叫喊媽媽道在老爺聽稟稟道具稟老婦馬氏生女倚妝幼親文墨偶遇狂生余夢白僞扮花案冒犯爺台恩蒙寬釋明示安民突出淫僧三茁不守清規素謀奸騙指稱爺台朱票擒拿花案人犯致死根由前來通報誘氏母女即時避居彼族希圖設網打撈切恩神明公斷止將首犯典刑覆載之恩有如天地大膽奸僧敢行誆騙若不予鳴民等必遭阱陷情極喊叫冒犯青天伏乞依律誅奸恩同再造上稟察院老爺聽了大怒道何物奸僧肆行無忌指官嚇騙王法難容你如今在本院跟前還有何辯說嗎三茁只是叩頭流血哀求速死而已正在施行拷打不意恰好府裏將王子彌中解到院公差投遞申文除未獲和尚一名照提在案一面添著捕緝帶了子彌一齊跪在丹墀伺候發落哪里得知天網恢恢疏而不漏子彌跪在堂下一眼看著堂上只見在上頭拷打的就是三茁子彌喊叫上前從頭到尾一一稟明察院老爺不覺大笑說道作孽投網撲火自焚如此淫僧罪不容死一發把這孌童一併開除可見凡人不要奸險過火你看王子彌不過因受那幾句狼籍就要去害那三茁三茁不過一時間妄想就要去騙那倚妝總是一般狠毒心腸那知道究竟害了自己自己吃騙而己已可見天道昭彰報應都在現世我看如今世上的人大凡設心總沒有一個不是子彌小官總沒有一個不是三茁和尚看到此處各人也要稍稍省悟些兒才好古人說過的如此如此還如此點點滴滴不差移察院老爺即將子彌三茁二人叫取大樣毛板各打五十子彌原是一個嬌嬌怯怯的少年如何熬得起這板子他的性命也不到打完先歸烏有獨有那打不殺的和尚打到二十五雙了還是好端端的察院老爺又叫取院前樣枷枷號一月喊屈婦人逐出免供我說可憐不可憐一個白雪雪的東西亂敲青竹一個圓光光的物件高托方盤到此莫提身後事幾時還作出圈人何消一月不夠一時不怕不圓成正果正是佛經果不謬自作還自受和尚與小官一旦同休咎好一個花枝小官忽自投黃堂法網好一個伶俐和尚倒落在老婦套中子彌告人而被擒太守認真到底三茁被告而不到老媽作法迷僧浪打東西萍蹤忽合杖下蔽辜板上結果都是無端作合煙雲繚繞看將起來這些未發覺的和尚與那正得時的小官俱要各各驚戒切不可犯三茁終歸拙子彌由自迷只是那焦彥貴雖經正法還有不服輸的妻子母夜叉孽債未完魔頭未斷料她是不安祥的種子必有甚麽計較出來看官們吃杯苦茗待不佞爲她饒舌第七回母夜叉訴逢馬扁詩曰無端生死倩誰憐作孽英雄下九泉鐵面堂中宜執法烏臺階下豈無天高懸秦鏡非虛設戰慄寒霜敢近前欲效杞妻城不倒焉哉乎也亦徒然你看察院風采這等決烈既處了焦鬼又處了子彌三茁花案兩字竟置不提母夜叉老娘也該打聽明白不必要去雞子裏去尋出骨頭來了無奈株帚破箕天生一對黑豬烏羊色樣成雙所謂人以類聚物以群分豈非古今一定不差的道理你道焦面鬼配了母夜叉平日有甚好事做出來花案一節原是文魔韻事誰要他突地撞來可知不是麗卿有心害他也是老天曉得他的惡積滿了斷不容他再活了特地借這個花案美名等他死得風流又借了他這一死替了麗卿等不該死的人又出脫了倚妝等不可死的人假如焦鬼彼時能不貪懷亦在逃脫安知不借重這花案場中一應主考門生並內外職事員役同到那三尺無情的法堂上去比較一番雖不至九死一生卻定是多凶少吉如今單把這焦鬼一人替死事到其間天乎人耶吾又嗚呼惻之但據他平素所做的事猶未足以蔽其辜因此老天又使那不安分的母夜叉不去聽天自悔還要生出枝葉來找完孽帳你道世間那些裘老三可是輕意惹得她的嗎雀角鼠牙興萬波於指掌朝秦暮楚賺兩造之金錢不佞每看見人家一小小釁與訟師商量畢竟要弄訟浪滔天刀風潑地若得他糞金擺佈偌大的事他也會弄做鬼火無蹤既可興無風之浪又能息有浪之風任意縱橫莫可端倪總是各衙門是他財庫各差役是他傀儡勾著一人弄得你七顛八倒越好做作死咬不放一紙之原被皆是掙子上官之喜怒盡屬錢神更有什麽人跳出得他圈套即如當初蘇秦亦戰國之訟師也被人行刺而死齊王大索刺客不得蘇秦臨終叮囑說道須將我屍車裂以殉於市大張生平罪惡如此則行刺之人自來押到請賞果然依了這個法兒立拿此人處死可見奸雄做事直到斷氣時節還有絕妙計策出來賽過諸葛孫吳老訟師之所以可敬可畏者在此話說母夜叉聽得丈夫把察院打殺了放聲大哭一場買了一口棺木去收殮屍骸只見許多的仇人冤戶倒有替他做孝子的一般團團圍住屍首輪流看守不許他親屬收領要騰到他骨肉狼籍身首異處那夜叉心生一計說道我若徑擡這棺材去他們看了畢竟要打得粉碎必須如此如此一徑先走到屍邊對著衆人狠狠的罵道我丈夫狗才平日作惡死有餘辜爲妻子的只好終日苦勸反討個吵鬧不休今朝這番現世報應可見天也有眼睛的不要說列位老爹們歡喜就是我爲妻子的眼面前亦覺得乾淨了許多我如今畢竟要了死人的肉咬他一口下來出了我的氣列位大家也都業咬他一塊肉落來將他送入千人坑裏也出了列位的氣才說得完竟裝一個虎勢就象要趕過去著實咬他一口的光景倒是