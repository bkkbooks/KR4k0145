發夥計出門假賠著笑臉走將入來對夜叉說道老娘你且息怒這也沒有在下的是處我們做訟師的本心要爲著人比那割股的良醫更勝十倍今日司茗之走也是一時天意我與你皆有罪焉如今也不必埋怨了且商議目前之事今日差人雖去回了太爺也只好暫寬期限若是日久無人定然要提原告豈不是誣告的罪名了如今在下又有一計在此管叫餘麗卿等人萬難脫網一個個捉到你老娘面前出你這口怨氣只消小小神通再不另要你老娘破費大鈔但是隨便措得些盤纏同我如此而行不惟避了府中拘喚而且宿恨頓消說罷大拍著掌連聲叫道妙妙夜叉聽了府裏要來提捉也覺張皇又風說到不消費錢鈔可報宿仇豈有不順之理即忙問貼天飛道有何妙計萬乞指迷貼天飛從容回顧輕輕說道我有一個嫡親母舅現任北京兵科給事他連年有書來接我我因盤費不周是以延挨至今未去探訪日前花案一事實系叛逆重情那察院概從寬赦原無此事我如今只消叫家母舅上一彈章說他隱匿重情得賄賣放八個字聖旨必然批究那時餘麗卿等人何怕他深藏狡兔少不得要畫影圖形一班兒捉將出來豈不泄你老娘這口惡氣此事不宜遲了恐府差纏住便難脫身老娘作速收拾盤纏即同在下起身依此計行萬無一失夜叉聽了這話好不聳動即忙打叠包裹跟隨貼天飛出門一路行來不覺已到高郵地面兩人投了歇店明早再行當夜貼天飛探聽夜叉已是睡熟悄地起來將夜叉行李並自己鋪蓋束縛一處罄卷回南展開鵬翮雕翎撇下牛頭馬面可憐失路婆兒鬼畫容分頭錯亂趕春風千山異境何如遠兩片精皮總是空嬌羞不作閨中嫵悍淚揚揚氣如虎聽著貼天飛去了只剩焦婆落焦釜落焦釜不相顧幹鼈殺真個苦依然已是一貧殍未蔔前途誰作伍次早起來急得夜叉叫天不應入地無路方才醒得從前一路都是騙局並司茗也是得了他的銀子放他走了甘把一個半大不小的家當收拾得乾乾淨淨寸草不留如今無處投身只得沿街求乞再作計較這都是焦面鬼作孽的報應正是喜非容易易於怒恩不能多多在仇半世含冤冤不了一時加恨恨無休語雲小拐子撞著大拐子惡人自有惡人磨一個母夜叉現是羅刹轉世一個貼天飛又從魔隊生來重重制伏如何可免總之千萬個訟師都是一爺娘胞胎所出但這等訟師連閻王十八層地獄中的鬼卒也都怕他死去作吵倒要保佑他長生在世焦老娘既爲乞丐已是揭過一板的了殊不知熱鬧生涯又是這老乞婆做將出來連我捉起筆來要寫幾乎笑斷髒腸列位你道爲何第八回老驛丞命棄流妖詩曰螻蟻一命自天來誰說囚妻可自媒貪惡不知三尺法風騷還惹一身災乞婆老怪真如狗驛宰新升頗似虺失接朝京清禦史可憐共作一坑灰那母夜叉自恃口談來得又撞著貼天飛想沒有做不來的事誰知一著不到滿盤是空然後知世界都是妄想結成如老叫化害相思病風流情種一妄也惰貪婆自撿新郎高結彩樓二妄也黑虎跳居官嚼民裝妖做勢三妄也三考官回家闊綽列名憲綱四妄也假斯文賣弄才學偏要刻詩稿刻考卷刻窗課盛行一地究竟露出馬腳五妄也這五妄如今亦不知果有這樣人否還可恨世上有一種假衣冠逼真叔敖真鬼魅盡屬黎丘胡行混世機關極其深暗尤其可惡假如小小前程也要費盡錢鈔隨緣幹來也要湊著官運頂戴得起還要在京裏坐守聽選不是五年三年不得到手若說他淒涼旅邸終日把歲月消磨就如那充軍徒罪業已問成重複望赦一般守著歲月豈不可憐要曉得此輩的官銜畢竟比芝麻大些也不可笑他銅臭便輕賤了他假使這班人果能自家謹飭守分該做的去做就象委吏乘田抱關擊柝當日大聖何嘗鄙而不爲胡能以孟氏之道做仲尼之官安知草芥前程不高作如巍峨科甲就是小小職分盡忠竭力自當于在生前建立名宦牌坊死後請入鄉賢供養受享春秋二祭強似如今兩榜人物進鄉賢祠的不拘好歹穢雜不堪是人是鬼都供養在裏面豈不辱沒了先聖先賢嗎至於當今士夫家政一發不甚之極簋不飭帷簿不修外則官體崢嶸內實端方不足雖則從來極蒙最勢利的老天多方蓋護著他聽他像意施爲到了這個時節連這老天也覺得十分看他不過只得要捉他一個破綻翻轉臉來把他自家顯遭天戮家財沒入天府妻子不免流離子孫不得昌盛橫行累世取禍一朝這般榜樣頗多故一世之雄也而今安在哉此在高官且不可況卑職乎在名族且不可況暴發乎箬帽天公靴尖秦嶽比那前說五妄又妄之妄也說話貼天飛生出這個計較來不過是哄那婆子又放這小使臨期走了才好改調進京把前後銀米盡數開銷又把他的被鋪行李乘機卷劫運跳高飛單單撇下這癡婆子權做一個異鄉孤客生死悉憑尊命忍心害理一至於此貼天飛既滿載而歸一心只要思量同妻子受用又恐怕天來算計他自家想一想說道就是這老蒼會算計熬那裏就輪得到我況且我比貔貅不同已自柔軟一半若與焦鬼並衡自知薰蕕各別我不過是日常間僭討人些便宜騙些許錢鈔日日念幾聲阿彌陀佛銷釋罪過便了我曾見如今還有萬惡不赦的只靠得口裏吃些素兒好端端還是活在這裏何嘗有甚麽天理報應都是如今這些好說因果的嚼嘴嚼舌哄弄愚人如何哄弄得我輩不覺自己高興得緊謅出一個曲兒叫名鷓鴣天賽過良平智識多更兼瀏撒快如何紫霞觴滿頻頻勸金縷衣新款款歌浮白墮樂妻孥人生幾度醉顔酡從今學念聲聲佛下界閻羅不怕他卻說母夜叉既被貼天拐騙沒處棲身無可奈何只得挨到高郵驛前鼈威威的坐著一來此處還可以遮蔽風雨二來靠著這大馬頭的去處哀求過往客官捨得一二文錢還好買些湯餅充饑終日沒事幹替那些披枷帶鈕的流徒在門首說說苦話兒不料這一日也是她該造化到了忽然撞著驛丞老爹紗其帽而圓其領搖搖擺擺獨自一個踱將出來巡視舡只忽然看見夜叉便開口問道你這婦人並不象我本驛囚犯爲何也住在我衙門前這個所在來往官員甚多誠爲不便速速別處安身那夜叉雖則半老若是扭裝些風致卻也投合餓眼只見驛丞問他故作嬌聲低語回復了幾句絕不象當初捉住司茗如狼似虎咆咆哮哮的光景你道她今朝的喉嚨爲何閉塞不響了只因她接連餓了幾日少些氣力又在失時失勢的時節湊著機緣正是所謂人逢喜事偏增好餓瘦腰肢學楚妝那焦娘子雖是閑漢的妻子在鄉黨間頗持大體只有她人前說話如今是落局之際因此低柔和美又加十二分的做作賣俏引得那驛官不覺眼花繚亂起來霎時間魂靈兒飛在半天雲外況兼他二十載離家久矣有鰥在下往日在京坐守前程的時節身邊又沒半余錢就要到柳陌花街高興發頭不過是數椽子挂炭的勾當不可常試只好望天空想如今已叨現任業有關防在身一些胡亂不得頗自寂寞難熬縱有一兩個門子隨身股役卻比那儒學裏才成精的東西更年長幾倍巴不得要使個法兒等面前這些驢馬畜生忽然都變做婦人齋我極鬼一齋方好若是要思量在這驛遞衙門趁出錢來娶房妻小除非再轉一世因此就想把這個婆兒既無根蒂若得我刷刨起來擡舉她做一位驛宰夫人諒她也決無推阻之理慌忙走進衙去著人喚她到廳前來問個來歷明白夜叉從頭到尾一一告訴一番深恨孑身無倚驛丞不覺大喜登時款進私衙設處兩件現成的衣裳裝裹起來當夜排設酒肴竟成洞房花燭夜叉也落得將錯就錯強如去那教化大行當時就有那吟詩贈賀嘲得好笑尋思孤驛可憐宵忽見佳人鬼面嬌半載丐婆今富貴多年鰥吏恣逍遙巫山綽約郵亭配閬苑倡狂趣事饒試問閨中誰氏女叉精本姓是巴焦又有滿庭芳一詞黑項拖雲橫眉掃月天生怪質難描驛遞郵亭馬嘶驢號一點淫心蠢動五更春興偏饒訴衷腸不盡休負好良宵古驛黃昏夜風標嫋嫋愈覺天嬈強供闊嘴顯出龜綬只恐歡來無幾日便須恩斷開交憑鬼刹削磨狗命始信禍根苗過得幾時不想夜叉十分作怪起來畫粉搽脂嚇殺牛頭小鬼揮巴撾臉驚中怒目金剛把這個六十多歲的老官兒平白地矮矬了一段夜夜要雲雨朝朝要酒肉支盡奶奶威勢吵鬧街坊鄰里那管你干系官箴竟把自家當做了一個內衙的鬼刹親管的上司不怕驛丞不終朝跪迎拜送要曉得做驛丞的一雙磕膝頭原是跪慣的他也樂此不爲疲只是在夜叉婆還該回想幾日前自何等的來歷一旦衣食充足雲雨如意也就略存他些須做官的薄體未爲不是大凡人是忘本的那個肯回頭返顧得水不浮抑且婦人是水性楊花一發流浪慣的在夜叉正在叫做一朝權在手便把令來行忽一日驛卒報到蘇州府察院老任滿回京馬牌到驛經過須要整備駐馬下程酒席掉換添撥馬匹人夫舡只並一應隨行官役花飯使費只因錢糧缺少正在忙做一團千方措辦頃刻又有一報接到說道前站禁止驛遞錢糧一毫不用這位大老爺比別位不同兩袖清風一心如水舡內止有文書一隻隨身衣服卷箱一隻空艙飛渡凡是沿途一概公贐常例護送官員人役隨路遣回真正清兼嚴肅絕不露一些的縂馬行爲並不象如今的承差不拘早晚臨驛科派需索打罵施行備了人夫又要幹折既幹折了又要人夫抓拿驛丞如蠅虎提放驛丞如猴猻如叩頭蟲不時起倒如失騌馬衝突奔忙氣喘喘忙急急不知此驛丞之苦何時得歇孟子之書有述置郵傳命之語郵者牛也置者舍也亦可以舍放了這個牛的意思今何幸此高郵驛丞撞著這察院老爺寬恩深愛如此簡省只要驛丞遠遠的在崖上叩頭跪接呈遞腳色手本便了那驛老聞得此信滿心歡喜又好與夜叉安心快活在水口等候了幾日還不見來只得著人到前路探聽消息並無蹤影一心又記挂這乞婆新婚多添這乞婆時時刻刻叫囚徒出來催他進去只得回到驛裏再行打聽正是無官一身輕有妻萬事苦卻說察院老爺原是做官清正得極今日任滿出境被本處鄉紳秀才良耆百姓攜老挈幼一齊臥轍攀轅跟出城來挽留攔住不放開舡齊聲喊叫道老爺鐵膽銅肝冰清玉潔我等情願伏闕啊閽懇留回任終不然這樣一位好官忍放去了就象我們一旦沒了父母如何是好不停一刻越發陸續聚集來了察院老爺只得自己立出舡頭上來分咐說道本院自從入境以來恪守官箴頗漸曠職雖無甚苛政加害爾等亦未嘗有甚好處爲及地方何必如此費心在爾等縱然苦留在本院壞了這巡方常格反加本院逆天大罪了要曉得往常舊套一個官府去任不論好歹自有那一班慣做頭的學霸糾合出來懇挽留恩習成故事不比得這一番真心實意萬口一詞察院老爺無可奈何只得又轉請司道府縣各官相煩安慰這些百姓不可這般造次那曉得這些百姓索性大哭起來山搖地震不能解散說道當日漢有寇恂文武備足有牧人禦衆之材光武命守穎川後朝廷又召爲執金吾征他還朝被百姓遮道呼曰願借冠君一年寇公畢竟被百姓留鎮衆力回天此雖異代之事我們也要緣此例難道大老爺做得寇公小的們就做不得寇公的百姓嗎察院只得泊舡一日希冀天晚百姓們自然散去那時連夜開舡未遲那曉得這些百姓一人傳兩兩人傳三團團圍守直到天明長宵露宿必要敦請回衙方才罷手整整亂了三日就有議造生祠的請建名宦的脫靴遺愛的鐫刻碑文的倒把那些葷飯大老倚仗著百姓的一片真心乘機生事請功便好從中兜斂使命公分傳啓如飛真個叫做鴉飛鵲亂衆口難調殊不知這個事關朝廷斷斷不能回的百姓們不得已只得各各拈香隨舡遠送夾岸如蟻遮雲蔽日直到三百里之外察院老爺恐怕衆人辛苦開了艙門又從新曉諭苦勸一番方才如山崩地裂一般羅列拜哭三回五轉依依不捨然後漸漸的悵惘而返此真三代之遺事千古之奇聞也察院老爺猶恐隨路還有人趕來因此分咐水手不許一路張揚悄地速行竟從高郵夜渡好笑得緊察院已曾過了淮安地方那驛丞還尚昏睡高臥不起察院老爺雖沒有計較他的意思但是舊規全統不可壞了故此那一班隨行的員役不肯甘心就著幾個承差率領幾個牙爪複回高郵只叫驛丞出來問他緣何既裁革了一應使費反敢藐視憲台不來迎接那曉得那新郎一時聽見已是驚得屁流尿滾手忙腳亂卻被差公一索牽出下舡回話不到半路活活嚇殺你說一個人做驛丞不知迎官送府曆過多多少少的風浪就象鼓樓上的鳥兒一般如何就被這承差驚殺了況且他原是承差出身爲甚倒怕承差且又死得這樣快熬只因他他原是一個有年紀的老人家多添近日新婚虛損呼呼喘息如燭遇風嗚呼哀哉竟捐館於驛郵舟次方知收留迷失夜叉原是與鬼爲鄰究竟死而後已從此夜叉仍前叫化後亦不知所究矣當有歌謠傳誦跳黑虎前程這螻蟻居要津蝦弓搗蒜不消停派三名五名趁三分五分賠錢倒貼難供命歎郵亭風雨淒涼驢馬伴黃昏何處遇妖精乞婆兒天作成乾柴烈火前生定拚三更五更未三旬五旬眼兒流淚腰兒硬太無情承差似虎結果老風情話分兩頭卻說司茗當時乘機脫回把前項的事一一報知麗卿說道如今府裏太爺已經出差拿我我雖脫逃勢必嚴行緝捕況夜叉進狀必然將花案事內的人一併具告相公避居此地終非穩便況且小人又不能出頭難以傳消遞息不若早避地方庶免禍及只得商議隱遁之策但只心心念念放不下倚妝複對司茗說道我今與你同去相會倚妝一面再行何如司茗道這是萬萬使不得的那夜叉用了許多官司本滿望太爺究出根原償他丈夫性命豈料被我逃脫愈加痛恨相公此去倘撞著他惹出事來不是當耍世上的事常是芥菜子落在繡花針眼裏的這個斷乎不可麗卿又想道我今此去未知後會何時怎樣通得一資訊與倚妝知道也免她朝夕懸念司茗只得應允道再無別法還做我不著再去走遭就是撞著這廝我自有法兒脫卸相公作速修書起來付我送去回來就好上舡趕路麗卿寫書已畢交付司茗去了隨即收拾行囊打叠登舟正是從前作事都無謂禍到頭來只自知若不預先生計較臨期那得出頭時可見惡人報應毫髮不爽清官播譽公道彰明話中兩路彰癉宛是一部春秋勸懲大既已盡於此但只貼天飛如何倒容他活在世上只因世人險惡老天故意生出此等人來假手磨滅直到磨滅殆盡然後慢慢的再算計到他自己身上去就如處置母夜叉一段情白也算得是奉天討罪了至如麗卿逃得乾淨司茗通得線索重新整頓筆墨看官們靜聽可也第九回挈相思月舠偷泛詩日昔日風流今日若誰知苦處爲風流更番顛沛情猶熱轉展流離意自稠山水生涯非我願風霜活計動人悉從來有聚還須散聚散都因我自求諺雲避難如逃雨將何處可以容我之身而得寬然有稅駕之地乎往歲婺州大被兵燹有一個富戶將自已的愛妾同了一個女伴藏在地窨子裏面內中攜帶了許多乾糧明炬上頭覆著石板真正叫做風影不露鬼神莫測的事專候大兵入城安插過了然後開放他們出來不過是幾日間的光景不料大兵一到卻好經過此地履著石板有些浮動疑心底下畢竟有金銀財寶藏在裏頭掘將開來不是尋常死貨卻是一雙活貨不覺大笑喜出意外負之馬上而去故知數不能免雖逃何益餘麗卿總是個沒搭撒的文人做出這般戲耍的怪事得脫逃幸耳況情不可極樂不可縱何可不顧前後恣其所爲到此客旅生愁寒蟬泣露尚不知前路去向料應與故鄉永別此苦豈可盡言因摘詠鍾景陵之詩道十載形魂凡屢定一舟情事不堪終別經覆雨驚濤後見在清風朗月中然雖如此要曉得麗卿梁張二公原不曾犯了色戒不過以憐才之心優待那些青樓才子正見得世上半多蠢漢那曉詩詞不過借此表彰一番取笑當世諸公況他三男三女雖各私下配認並不曾有半點肉麻一毫苟且麗卿輩意中見得有才有色的女流真是現世瓊瑤天然琰琬何能不爲天地珍護至寶就是文娟三個這番驚散以後並不敢倚門賣笑但以詩文彼此唱和遣懷靜待惟祝望天緣作合而已品質清高風流絕世還有如倚妝三人的嗎故今雖彼此各如驚鴻飛散雲影飄揚吾意必然有五丁巨靈替麗卿開闢險陰祥風瑞雨替麗卿遮護風波喜神呵擁福曜盤桓一往定有佳構必無歧路生悲即如鴛鴦譜集內說有一美人已曾爲巨盜動載飛艎萬無生氣救止忽被張旭點睛畫龍憑空生出雲霧大興煙障彌布狂風只見傾刻間天錯地暗竟將彼美攝取到一個所在頓一時綠林豪客盡供巨鱗一飽要知天地間的事總是一個常理有才的天必重之有色的天必愛之你看若是老天不好色嫦娥怎占廣寒宮話說麗卿與司茗商議移窠斷難耽閣只是與倚妝看看隔絕未免施她不下即時修書一封著司茗飛報倚妝切不可象前番不小心撞著夜叉耽誤大事司茗持了書急來倚妝家裏倚妝一見先已泣涕如雨拆書念道憶昔屏花心結就月盟聯生死之期不忘自矢不期賈禍風流天涯面隔只緣業障未除又欲片帆飛去新暌者迹常接者神想仆之與卿猶卿之與仆耳第恨鵲未成巢萍終無蒂山耶水耶不知此身飄泊何所相見未有期願永訣於一言倘能兩心相許不我遐棄是則仆之所深幸者也投筆哽咽不盡欲言倚妝對書唏噓不已叫司茗稍候片時再勿因媽媽不辭而去隨即撿幅花箋含毫寫意念妾雖是煙花下質頗外丈夫氣概此心匪石未易輕移君是讀書人自有本等要做的事斷織投河妾當效尤勿雲微氏之故遂至墮名毀行遺笑前人不知腰間鬥大之印不備嘗辛苦不可得也何不棄此奮翮雲霄拾取青紫於妾與有榮施若夫守志負潔不負前盟此又我自爲政何煩辭說乎故古有臨岐泣別題詩寄贈牽裙留連訂期重會此等唧噥我不忍爲此態也各不相負惟在一心能彼此相信得過必有機緣自合耳至於道路之賒風霜之若千萬珍重珍重千萬書已寫完就遣司茗別去不心在此稽留司茗捧書回復麗卿麗卿讀罷深感激勸之言頗重相成之意且泣且歎遂與司茗即日商議遠去說道我們如今往哪一路去才好或竄於西泠或蹈彼東海未知廣柳車中果能藏季布否也因記得當年曾有一個嫡親的姑娘出嫁在三衢地方只因路途遙遠迄今不通音問我小時曾見過好幾面儀容還有些認得此去只好到她那裏若得相依亦是窮途際遇只是還有一說萬一姑娘先已去世那時又叫我投奔何人要曉得她家定有子婦或者敘起親情原是姑表一脈豈有不相識認不相款留的道理但只是此去還該隱晦恐有鷹之逐聊溷雞鶴之群我的本籍姓名斷斷不可露出我想姑娘姓魯我如今也改做姓魯單名昭字表字易水正取當日春秋時魯昭公次於易水的故事這真是迹類亡猿於誰爰止即便同司茗叫了一隻小舡竟抵杭州一路淒淒不知從何處說起隨著司茗撿出舊時筆墨無非是滿紙淒涼一腔離恨口占一調名日巫山一段雲非爲秋風瘦春心竟不收黃昏有月破雲頭青光到處幽羅幃應有夢夢裏亦知秋巫山有路覺來悉無語一扁舟三日到了北新關登了岸直到江幹正值八月十八日潮生的日子但見石門夾浪忠臣怒氣三千江岸奔濤壯士雄心百尺天連水水連天掀開銀海盡處真真處盡叠起雲頭裝成瑤島想從弱水飄來凍就冰山豈自龍宮推出易水見了江濤滂湃水勢崔巍不覺流連感慨浩然長歎日白雲在天蒼波在海悠悠我心竟將誰訴因同司茗慢慢而行不知不覺已到了富春交界正是江潮叠怨三千丈直到嚴灘恨始休那曉得走了半日竟走了岔路山瘴朦朧日雲暮矣四顧彷徨莫知所措易水正在躊躕之際忽地裏草叢中鑽出一條漆黑大漢來手裏拎著一根無情短棍腰邊挂著一口雪亮腰刀奔到面前拿起棍子望易水劈頭就打幸喜易水看見得早曉得勢頭不好把行李包裹盡數抛撇不顧將身閃過一邊雖然逃脫無恙但只是不見了司茗不知他躲避何處又無從打探尋覓又不敢高聲呼喚獨自一個好生悉悶何況易水與司茗兩個雖系主仆實是瑣屬流離相倚爲命正在徘徊眺望間忽聽見前面草裏漸有聲自淅淅簌簌響將出來像是還有人在裏頭動作的一般易水只道是優藏的強盜尚不曾去或者是個老虎伺候吃人究竟不知生死若何老早的嚇得一身冷汗手足酥麻你道是什麽物件恭喜卻原來正是司茗凹在這個草中伸頭探腦鑽將出來走到易水面前放才放心當夜兩個好不若楚又沒了行李又沒處去尋客店沒奈何一步挨一步不知東西挨到一所破古廟裏去住了一夜蹲到天亮路有行人方問得一條出路又不知走了多少裏數走得到水口幸喜司茗身邊還帶得些餘鈔不曾把強盜欽取摸將出來雇了一隻船直奔龍丘一路風霜黯然行色烏鵲南飛伶仃可歎易水就在船中遂詠遠水詩一首詩上說道煙雨迷人去悉多境屢更水疑雲際合塔似霧中行遠樹疏還密回峰側更迎淒涼惟自慰聊遣棹歌聲不多日子已到岸口兩人起了船若無息足之地就遍處去探訪魯家並無音耗只得遙指酒簾聊將憩止那店主人看見他們兩人都是光身不見半戶行李便問道是哪里來的司茗道我們是蘇州來的店主人道既是蘇州來的難道出行遠路一些鋪陳也沒有我們這裏現奉上司明文嚴禁不許安歇面生可疑之人卻不是小店不留二位只因官府兜搭不時查訪難以容留請到別處方便罷易水只得哀告說道小生姓魯喚名易水是蘇州府學秀才我兩人是主仆同來探訪親姑不期綠林被動所以孑身到此惟望容留一宵明早即便辭行那主人說道既是相公原該留歇但不知令親是甚麽姓名住居何處倘離此地不遠何不竟到他家也省得一番起倒看官們這話極是說得近情但不知易水只因不曉得姑夫的名字居址故此不能夠竟到他家住若是曉得也不到你店裏來看你的嘴臉了當下易水只得含糊應他究竟說話猜疑卻被主人嚴下逐客之令不免仍到廟中相陪神聖再過一夜兩人哭哭啼啼在神明面前拜了幾拜禱告說道若得指引迷津不致爲異鄉餓殍那時重修廟宇再整金身許下一個大大願心你看親雲不系東西影野鶴寧知去住心到了第二日又去滿街探訪好似窮人無歸做了一個窮途痛哭的阮籍只是如今怎麽樣好身邊盜餘都已用完姑娘家裏又尋不著跑來跑去倏忽又是一日況且這個所在並不象昨日還有個廟裏可以存身風煙稠密都是人家如何是好兩人無計可施只得傍晚坐在一個人家的門首屋檐底下打盹安息不覺寒風侵擾神魂恍惚唧唧噥噥說了一夜的苦那曉得裏頭管門的人聽見了疑心起來說道爲何此時半夜三更門外有人說話這個定是不良之人了又聽了半晌還不住聲輕輕開出門來一把揪住等到天明傳入中堂去見主母聽賃太太處分你說不奇不巧那太太是誰不是別個就是他的姑娘太太道看你這般齊整一個後生家端不象似下歹人卻爲甚麽原故暮夜匿身在此事實可疑易水道小生原不是個歹人小生原是蘇州府人只因探望姑娘中途被盜店主人見我主仆罄身俱無行李不肯容留只得暫借尊簷安歇一宵望乞詳情說罷便潸然淚下太太卻也仁慈見他這般光景想必是個良家兒女到這裏落難的了便問道你既有姑娘在此爲何不到她家裏去呢如今你的姑夫住在哪里叫什麽名字你叫什麽名字易水道我姑夫姓魯只因長江隔斷久失往來就是我那姑娘止在幼年間見得一兩面故此姑夫的名號都不曾曉得所以尋訪不著我是姓餘名昭表字易水我父親曾爲宰輔原系名門宦裔我也曾進黌宮只爲父母雙亡家業凋零不得已思量投奔至親來到這個所在太太聽見這話不覺打著自家心裏暗自想了一番掉下兩行珠淚回顧左右使婢說道我家也是蘇州也姓餘我哥哥曾爲相國今與這人所言一一相合難道就是我的侄兒不成若果系我侄兒我如今又沒有兒女他又沒了父母不如等我收留在此教他讀書所頭若得一舉成名也是我的本源一脈欲得遽要認他萬一他原非瓜葛假附喬枝那時識破機關卻不把人笑殺欲得不去認他假使果系我親枝任他飄流旅邸覺得心上又過意不去我如今有一個道理再去盤問他一個的當然後收留不遲我因記得起我的哥哥當初只生得一個兒子那孩兒生出來腋下便有三顆黑痣以此相驗決無差謬遂轉對易水說道我的母家也在蘇州聽你的說話我的家世卻與你的家世相同我只爲路隔三江多時不通音問但我家兄曾有一子生下來的時節他腋下便有三顆大痣若是沒有此般色認別的都不必講了易水聽了一面口裏連忙叫有有有一面流水開懷相示果然無異易水驚喜交集泥首膝前認了姑娘太太就叫出僕從男女都來叩頭以謝昨夜冒犯之罪登時排列家宴與易水歡敘洗塵又對易水說道你的姑父不幸早喪又無子嗣雖有些須家業究竟不知是哪一個受享況且我的年紀日就衰老眼前並沒有一個親戚可以倚靠得的意欲留你在此就如親生的兒子一般你可搬取媳婦同來一家居住你卻意下如何易水道侄兒孤身只影雖曾聘得一個媳婦尚未做親一者爲家道艱難一者爲功名未遂以致愆期必須置身霄漢方議完姻今朝幸得姑娘蔭庇容留不使侄兒爲異鄉窮殍何異恩同怙恃太太隨即叫收拾書房安頓易水住了易水到了第二日想起對司茗說道我們若不是前日的神明顯應安有今日叫司茗即去買些香燭同到所住的那廟裏一則來拜謁神明指引之恩二則來專保佑倚妝三個安然無恙日後團圓的意思正是浮萍才得些須蒂又惜楊花尚遠飄身在江南心在北春情何日睹桃夭指望投奔姑娘尚在模糊境界忽然撞到懷裏一番撫摩親切謂非廟中指迷不可公孫弘東閣待客魏文侯擁彗迎賓即此尊姑亦是女中丈夫非尋常人也然而即次之安尚屬小事尤恐花案終成禍水未知何日果是麗卿出頭日子第十回憑好夢鬼窟全生詩曰共蒂花翻向日嬌春光未盡忽蕭條幾經墜雨階聲亂況複淒風樹色飄歧路孰攜蓮步怯扁舟空載舊香漂悉將淚眼看長別一任浮萍去影遙黯然銷魂者惟別而已昔有詠行路難者曰閨中少年忽遠遊羅幃半卷涼生秋我獨辜幸限河梁即之不得徒憂傷行路難不在水不在山只在生離死別間況且女人家出路更與男子漢不同又是在流離顛沛之際其苦可知然而要曉得從來不但文人命遭磨折即有才之女亦多顛連天下有庸庸猥瑣之品而坐享癡福者必是白丁與醜婦始得保富貴以終天年安寢食以免悉慮耳如此之人則亦何足以存亡有無爲輕重哉故倚妝不幸有此一番遷播流離總是她錦章奇字都化做啼香泣粉原是自已才貌所致于人何尤蘇東坡韓昌黎俱命坐磨蠍雖享文名各受折挫甚至降點流竄極于遠方而執事必欲置之死地而後止然止足以彰其名譽之美何曾損彼至德總是滿前荊棘境路不寬惟有文人學士多罹此苦非庸輩可以搶奪得去的今以倚妝之才之美即將蘇韓大手筆例爲並重以稱鼎足未爲不可話說易水多虧了他姑娘留在家裏收拾從前孟浪春心仍親書史絕不似當初風魔故態頗有發憤爲雄的意思這也不須提起一日偶湊一位過往大官府回京路從江南蘇州府經過聽得父老歌頌前任巡方德政遐邇合一即漢之張綱唐之李佑甯之唐介亦不過是口碑載道輿論僉同誠當今聖朝之真禦史也這過往官府已是擊節稱歎又聞拷問花案一宗杖死首犯一名其餘都置不問說道只這一案可謂寬嚴得體情法兼盡雅不欲以書生妓女遊戲之事株連無辜即此已便見鐵面所爲不惡而嚴之妙政致京中遍傳此事總是極口先讚歎察院的公明原故不料滿城盡數曉得花案奇聞無不盛傳新異既奇其事又奇其人殊不知袁令昭之西樓記中有品曲盧次楩之想當然內有評花何往非才人美女之佳致正是看盡好花春臥穩醉殘紅日夜吟多只有蘇州府一個客商販了許多綢綾緞絹往來京裏字型大小店中發脫其人生平專好的是尋花問柳好說新文正要束裝回南只聽得都中盛傳此信錯會了主意只道是不好的消息好不替倚妝輩懷著鬼胎捷忙回來報知倚妝媽媽那媽媽心裏一口猜著是母夜叉在京中幹下事來驚得一家大小哭個不了淒淒慘慘好不痛傷大家都來埋怨倚妝倚妝被人埋怨不過心中暗忖只是放不下麗卿但他已是出亡在外天涯海角一時何處尋覓到不如我自已尋個自盡的門路日後也省得貽累余郎又想我若死在家裏縱不貽累余郎畢竟又要干連媽媽此中也覺過意不去不若同文娟弱芳兩個商議且相隨伴遠避他方潛蹤滅迹到路上看風使帆或者天肯見憐暗中指引遇著余郎也未可知然雖如此但未知她二人的心事何如因接文娟弱芳到來三人促膝而談倚妝道汝等還記得前日席上之言否盟誓猶新神明可畏倘一旦貪生叛盟將狗彘不食吾餘矣何況日下京中人回花案一事都下盛傳必有嚴旨部文根究黨羽麗卿若在他還是個男子秀才且有年家朋友還可覆庇我們他今已遠避若有官司口舌一徑來尋我們平康門戶是衙門中一碗爛飯捉我到官一口釘住我的身上要討麗卿那時做我不著使他得乾淨也說不得了只恐我被拘囚解交不得推麗卿到別個我心不忍又一時捏不出一個麗卿來這叫做賣一個饒一個獨木不成林兩敗俱傷我們三個生爲寒盟之婦死爲薄情之鬼何顔複見卓文君李亞側之輩乎不若成陶結隊或者萍蹤偶合男女死生一塊也不負一番金石盟言二人聽了泫然不止決烈言之說道我兩人只有一死以謝二生耳夫複何言倚妝已曉得兩人志向遂把速避的主意說出二人無不欣從相約已定即忙草草收拾悄地同行雇了一隻小船飄然長往一任所之惟願共住一方覓個幽密所在即不及避秦桃源亦當作商山枯衲所謂入山惟恐不深耳或托村莊織紡或就主家針指或間賣詩文聊以自給雖則愆期於歸有待三人正在船中相約定了只見霎時間那不作美的風浪一時狂湧起來那船好象些甚麽就象個蝴蝶兒在半空中顛翻上下把捉不定正是憑空叠起千層浪突地掀開萬頃風三人倉座登舟原是不曾出路憒的到這時節只該穩坐船中任憑艄公做主還可支援怎當她三人慌了結做一團跌來滾去一陣側風竟把這只船兒告乾千歲第一覆了可憐倚妝三人當此急流湧湍又助狂風驟霎時間俱爲水中之浮梗飄蓬而已非甘抱石之投棄葬江魚之腹咳可憐可憐你們要曉得有才有色的女子就是死在河裏那河伯雖甚不仁亦不敢取以爲婦故此弱芳沈在水底只見黑茫茫裏有一帶的去處象有神明暗相扶導一般隨流抵岸攀援拯救到一間小小茅屋側邊弱芳還是模模糊糊如醉如夢之間只聽得耳朵裏有人對她說道岸上就是大悲庵了弱芳掙著起來擡頭一望看見果然是個庵觀的模樣門前一個匾額大書大悲庵三字弱芳心裏想道既是大悲庵定是女衆不覺欣感異常但只四顧無人這聲音卻從何處來的如何有這般奇異從水得生明系神護無穎矣只見這庵裏面只有一個老尼姑這尼姑夜裏忽夢見觀音大士身底下坐著一朵蓮花手裏撚著一個拂子老尼姑向前慌忙頂禮大士對老尼道庵門外有一個貴人的妻子該汝速救那老尼聽見雖打從夢裏驚將醒來還不信得真仍舊睡去夢寐之中又聽得唏噓哭泣的聲音好象就在她床頭左右及至披了衣裳坐將起來聽聽看並沒有一個人然是作怪得緊老尼只得開出庵門周圍探望只看見果然有一個女人裙衫透濕席地號咷老尼驚駭夢中的言語即忙扶進庵來替她換下一身濕服問道小娘子爲著甚麽要緊事便是這般輕身投水弱芳道奴家姐妹三人要往親家探望被風失水以致如此奴家得蒙憐救果是再生但不知我兩姐姐生死若何好生記挂老尼道小娘子既是失水如何又出得水面其中必有原故弱芳道可知道怪異裏奴家落水的時節姐妹三人結做一塊只見水中許多散發夜叉爭奪奴家三人正在鬧壓之際有一位金盔金甲的神道手裏提著鋼鞭趕將來喝退衆鬼口稱三位夫人在此不得無禮又對奴家三人說道三年之後夫妻完聚先將奴家提挈周旋推攏岸邊得全性命那老尼聽見道果是奇怪也把大士夢中的言語細說一遍各各驚訝弱芳就同老尼到佛前拜謝顯應之事願求菩薩一發救我兩個姐姐並保佑丈夫功名遠大夫婦團圓又把老尼四拜爲師情願在庵裏皈依因作臨江仙一詞表白自家心事說道明窗紙隙風如箭幾多心事難忘一爐繚繞見行藏皈依雙合掌頂禮頌空王只因念日成抛棄羸減玉消香誰與訴衷腸行雲終縹緲羞共楚相將卻說倚妝文娟還沈在水底並沒有一個出頭的去處忽然起一陣大風把她二人一浪打開兩處那文娟正打在村落岸邊岸上有一個賣豆腐的人家婆老兒兩個五更頭起來磨豆那老兒走到河邊去汲水忽然看淺水岸邊躺著一個人覺有些呻吟求救的聲息卻是黑地裏看不十分明白連忙叫婆兒快取燈來那婆兒聽見叫燈只道是丈夫跌在水裏慌忙提了燈一步一跌跑到水邊老兒道水裏漂來一個人在這裏婆兒把燈一照只見是一個失水的女人兩個盡力將文娟抱起扛到屋裏尋些破衣破裳替她換了忙把姜湯灌救醒來問個明白那文娟好象似夢裏昏沈的半個時辰方才曉得人事知道自已還不曾死就對那兩個老人家深深的拜了幾拜謝他活命之恩婆兒問文娟道我看小娘子不是尋常人家走出來的原何這等短見文娟卻與弱芳的說話不約而同也照依訴說了一番只見那兩個婆老兒自言自語歡天喜地說道這都是我們老夫妻兩口一口准提齋半世賣豆腐並沒幫手又無半點骨血故此天公憐念特送這個如花似玉的女兒把我們做個靠傍或者日後配得一個好後生做了一對夫妻便好頂我們的豆腐香火文娟也巴不得他二人收留權時安息再作區處古語有雲枳棘棲文鳳沙潭寄巨鱗隨緣且自過時至一番新那些說話且自由他你道文娟弱芳倒好了那倚妝怎麽樣呢終不然自她的主意單把她一個沒救不成其時倚妝竟不知不覺被這一陣風打到哪里去了好笑得緊卻不打在別處一打打到一隻大座船邊倚妝半沈半浮有氣沒力看見是個船舵雙手抱住舵梢身子還立在水裏好象一朵出水的芙蕖那裏曉得這只船不是別個就是蘇州府巡按老爺奉旨進京調用的船那老爺本籍原是山東乘便回家不期這夜裏夢見一個神道手裏拿著一顆人頭血淋淋望他懷裏丟將過來對他說道你好好藏著霎時間又只見一個秀才手裏撚著一把雪亮的鋼刀趕將進來把做官的劈頭亂砍搶這顆人頭做官的慌了就摸出懷裏的人頭打將過去恰好正打在他的刀口上