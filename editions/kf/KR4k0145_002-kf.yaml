body:
  text: 第十二回三合巹各湊奇緣詩曰曾于石上問三生爲甚從前不可憑豈是書生偏薄福只緣閨婦太多情菩提未必皆虛語節義而今可自鳴苦被老蒼顛倒殺相思淚雨盡爲傾天下極貴的人可以榮我辱我天下極賤的人亦可以生我死我麗卿爲察院因考試一花案彼此驚散而功名榮顯即寄於此後因憐憫待詔一時收留誰知夫婦會合全虧他探子事不奇不新不新不奇也不傳世人株守古拙不知事變聞此新怪之事便謂不根之談豈以鼎甲團圓新姻舊好盡屬烏有之詼辭乎故知極執法的官即是極做美的風流五蘊極沒緊要的人即是極作合的蜂媒蝶使判合使離撮離作合總有一個絕大機緣非人力可以強爲我們要曉得這老天是個極刻薄的亦極忠厚的假若一味刻薄將世上這一種有情有義的都弄得東零西散七顛八倒一些下梢沒得豈不可痛可憐若是一味忠厚聽這一班撿精擇肥的都幹得妥妥貼貼完完美美只這老天竟是個頑鈍不靈之物一些波瀾也沒有把這些傳奇異的手段安放他在何處今不說別樣奇聞只這餘麗卿與倚妝分別是一段絕快活的事偏生弄得你哭哭啼啼後來分明是一段絕淒慘的事偏生又使你歡歡喜喜虧殺變換得好生者不許你即生死者不許你就死奇怪超忽匪夷所思話說易水給假回來終日是思量倚妝忘餐廢寢到了瓜洲地方天色傍晚只得趕幫泊船只見魯留已是個翰林院管家詞林大叔日日在船梢上替司茗兩個賭錢吃酒這日魯贏了跳到岸上地買酒請司茗到處去尋酒店不料劈頭撞著文娟正在那水口釣魚兒耍子魯留一見盯清認得說道這卻不是文娟姐嗎不覺眼珠裏噴出火來還恐或者有錯牢立腳根仔細認了一番看得明明白白一些不差走將過去把文娟衣掌一把牢牢扭住正在交解不得大家叫喊那豆腐老兒看見一個漢子揪著女兒沸亂不知爲著甚事三步做二步趕來救應扯住魯留叫起屈來爲何打我的女兒那魯留放了文娟扭住老兒說道你好大膽你騙拐了人家的女子躲在這裏連累得我把妻兒妹子一家喪失扭到船邊去報知老爺易水聽得魯留叫喊只道他在岸上倚勢闖禍替人廝鬧正著司茗喚他上船問他拿著何人如此喊叫急得魯留氣喘難言一字也聽他不出只把一個指頭來指著那老兒說道小小的的的妻妻子要他還還我易水問那老兒道你怎麽拿他的妻子老兒道小老兒並不曾曉得他甚麽妻子小老兒是本地方人積祖住在這河口又不是別州外府新搬來的小老兒只有夫妻兩個生得這個女兒一生靠賣豆腐一步不走出門的今日因磨豆閒空我女兒走出水口捉魚兒耍子不知他是哪里來的把我女兒結住亂打那時小老兒見打女兒扯住他問個來歷他就丟了女兒揪住小老行兇起來意不曉得爲著甚的望乞老爺詳察易水道如今你女兒在哪里你可叫上船來待我問她詳悉畢竟有些原故那老兒跑到屋裏叫出女兒同到船上來見了易水卻說文娟一頭走的時節已看見船裏坐的是餘麗卿不覺放聲大哭走上船來易水遠遠認得這是文娟也不覺放聲哭倒在艙裏被家人扶將起來易水便一把扯住文娟問她說道我聞得你溺水死了如何還在這個所在文娟帶淚咿唔盡將前項事情一一告訴哭個不了又道不知我兩姐姐生死如何又不知張郎今在何處易水道又張已做官了但不得與你一處也是孤身赴任那老兒看見女兒與做官的這般光景目定口呆唬得面如土色易水就對老兒道你不要慌這個不是你的女兒她是滋陽縣知縣張老爺的夫人原不是你拐騙來的倒多虧你收養了幾時我如今要將張夫人送還任所叫司茗取白銀一百兩過來這是酬你二人看養之資又叫文娟上岸拜謝他夫妻兩口活命之恩另著人雇了一隻大船安頓文娟易水對文娟道我該送你到山東看此不意相逢之事以完百歲良緣只是倚妝尚無下落好生放心不下如今梁遠思也中了進士就在這淮安府做推官離此不遠我今送你到彼處著他差撥人夫送你便了又叫魯留吩咐你的妻子都在我身上不許與那老兒糾纏那老兒哀求道小人與他雖非親生骨肉卻也如親生的一般思量靠她結果終身不想做了一場春夢我兩口情願跟隨張老爺伏事夫人也不枉我三年夢想易水聽他哭訴道這個使得就叫老兩口即時收拾家私伴送文娟同到淮安先將文娟停輿在外著令陰陽生即時傳報說有同年魯翰林老爺來拜只見遠思聽得是同年魯翰林定是麗卿連忙出堂相迎見了即忙請進內衙也不敘寒溫一把址住只是大笑不止說道小弟近來有一件絕大的喜事又是真正的新聞正無由達之賢弟今日來得湊巧小弟初蒞任時偶而參謁上司舟泊江岸聞得說岸上有一個大悲庵觀世音菩薩極其靈感小弟就整整的齋戒了三日到那庵裏進香一來願弱芳姐姐早升仙界二來癡心妄想還希冀她或者不死思圖後會完我姻盟參拜了畢庵主老道姑送茶你說那老道姑旁邊立著一個道素妝扮的是誰就是弱芳她見小弟穿著官服不敢上前嗚嗚咽咽哭將起來卻把腳兒立住停了半晌走到面前被小弟看見吃了一驚因問她說道你是弱芳是人還是鬼我聞得你已失水死了如何又在這裏那弱芳把前樣事細說一番帶她回來如今現在敝衙小弟已曾偏背完了百年大事豈不是世上第一等絕奇的事嗎小弟又細細問他說你既不死你可也知道兩個姐姐在何處她還說得稀奇她說那日姐妹三人一同落水水底下有許多的奇鬼都來爭奪她們三個被一尊神道喝散還吩咐她們說三年之後教你夫妻完聚小弟屈指起來恰好是三年之數小弟的事既在絕望之後不期而應則兩位嫂嫂決決不死斷乎不出三年自然完聚易水聽見大叫起來說道難道神明有靈偏在兩兄顯應獨欺負我不應不成小弟今日之來亦有奇事頃因停舟遣仆上涯辦事不意文娟臨水釣魚小仆特地尋她無心撞見如此這般弟既喜得文娟意欲送到滋陽不宜遲緩省得盼殺張郎也遠思驚問文娟在哪里易水道現在門外可請她進衙小弟就此告別小弟如今也不回家我想兩夫人既在倚妝未必就死弟當一路找尋曆遍了九州四海必要得個下落想神明之言諒非虛語說罷又大哭起來遠思道不必憂傷你這般熱腸全友天豈有獨奚落之理寧耐數天定有美報遠思叫快傳雲板請夫人迎接張夫人並來拜見魯爺相見已畢各各驚喜獨倚妝下落尚爾杳然惟恐麗卿傷懷遂口占一律聊志聚散詩曰舟棲愁絕處寥落盼孤寒日盡天逾遠形單路不禁隔墟煙帶曉近峽氣層陰病骨他知否江流淚落襟易水本意南行因想文娟弱芳夢中之言必有靈驗若果倚妝不死斷不遠在他方不若且送文娟至山東交付張郎我今在此得遇文娟或者張郎在彼得遇倚妝也不可知這也是易水一種情癡妄想無聊之極的帳目因此當日別了梁公仍回故道複至山東心中卻是十分抑鬱眼見得文娟弱芳都有著落偏我倚妝鏡花水月以此一路淒淒更難排遣不覺染成一病閉眼開眼睡裏夢裏心中口中行著坐著除出倚愉兩字並無替換得她正是天下有情人不解相思味思君不見君明月蘆花夜將及半月到了滋陽又張接著喜出望外易水因臥病在船不能登岸當初易水的會試本房系山東兗州人因前年差滿回京途間得了這夢恰好救得一個女子因自已不曾得生兒子就收留他做了女兒後來升任京堂適值會試分房取中首卷就是易水幾番見他獨自一個並無妻室思量把這女兒許他及查他的齒錄上又刻著個曾聘二字卻是疑心若說曾聘必定是有家的了如何不開注某氏只因他刻了這兩個字故此不便提起今聞他特至山東因病不能拜謁必須親自看他京堂公來到船裏家人稟複道家爺臥病在床京堂公道不消驚動待我自已進艙一看只見易水偃然在床房中並無一物桌上只供著一個牌位上面寫著亡妻倚妝之靈位側邊又添注一行小字孝夫余夢白奉祀京堂公吃了一驚說道好奇怪倚妝夢白都爲花菜一事是那年老夫勘問過的卻與魯生甚麽親知竟將此木主供養在他的船中那京堂公見過易水不便問及此事回去說與太夫人夫人女兒知道這樁奇案卻難明白倚妝心裏自明方才曉得麗卿已到京中畢竟爲我尋訪消息但不知與魯公有甚瓜葛把我設立牌位在他的案頭又不知他幾時聞我的死信不知不覺忍不住了哭將起來卻被京堂公聽得叫出女兒問她原故倚妝明曉他就是原任巡方抵死不說將些閒話支吾京堂公一時惱怒起來畢竟要追究根由倚妝諒也瞞他不過把前頭的事體一一告訴只求饒死京堂公心裏想一想道我當初原不過一時執法把焦彥貴死於杖下已置餘黨於不問他們如何就是這般驚散分離以至於此況且倚妝在我跟前已經三載頗稱淑順就是夢白也不過書生孟浪不爲大傷風化且我又因此得了聲名未嘗有損於我既是倚妝原與夢白有約老夫亦可主婚但不知夢白現在何處魯生與夢白是何親屬卻不明白我明日再去探望魯生就將女兒親事說起看他怎的回復再作道理京堂公次早又到易水船中著人通報易水扶病迎接請進艙裏京堂公慰問已畢就把女兒親事挑口問他易水只是低頭流淚不復京堂公說道賢契不言不語卻是爲何老夫有一疑案當與賢契決之老夫向年曾在蘇州巡方拿一起花案公事老夫以爲此必多情豪舉不甚深求只將濫叨名器者聊示薄懲他無苛政也昨見賢契案頭有這兩人名姓不知那余夢白與賢契是親是友有何關切倚妝現在京中何以就說她死想賢契定然曉得望乞爲老夫解疑易水雖老早知他就是前日的巡方今又聽得說倚妝現在京中不覺十分喜動顔色歡生眉宇暗想道他如今是我的座師我又是他一個翰林門生我就對他說出真情卻也無甚利害說道夢白與門生卻有一面之識倚妝已經溺水身死老師何以知她還在京中京堂公也不回他又問道老夫還有一件疑心一發說明了老夫見賢契兩次來都並無家小只道尚未議婚及查閱齒錄已刻曾聘但是既聘何以不注寫某氏既有人家何不完娶即或中斷離群豈乏絲蘿重結何以獨枕寒衾甘心孤零老夫不能代爲之解也易水聞得此言不覺涕淚交集道門生今日之病已入膏肓便與老師說明想亦無事當日之余夢白就是今日之魯昭也門生自從冒犯師台惟恐禍將及已故此更名易姓倚妝即門生曾聘之妻室也只因流浪出外失水身死她系女子尚能爲門生守節門生乃堂堂丈夫反不能效一女子倚妝既不能複生門生亦決不可更娶寧可斬余門之宗祀並不敢負彼恩情口裏不曾說得完已放聲大哭京堂公驚道且慢且慢若據賢契如此說來那倚妝抱恨中流賢契含傷旅邸從前罪過都在老夫一身了今賢契既是身擢巍科官居翰苑豈不聞孟子有雲不孝有三無後爲大賢契乃踐姻盟之小義抱宗祀之大愆是以其小者易其大者豈可哉不若聽老夫一言才夫有一小女雖非麗質也未必不如倚妝願與賢契結爲姻婭亦可銷釋前愆幸勿堅執易水道多蒙老師雅愛敢不從命但只門生有誓在前不敢輕背京堂公道既是不行也不好相強只恐日後悔之晚矣佯怒就走正是酒逢知已話不投機竟回去說與夫人女兒知道好笑癡生執迷無底他但曉得餘生魯生總是一個卻不知我這裏倚妝與女兒原非兩人倚妝聽說麗卿就是魯生不勝歡喜異常巴不得魯郎應承這樁親事又恐終久執迷反誤大事京堂公心生一計也不到魯家去勉強他成這親事竟叫了幾班鼓手擡了花轎叫倚妝束裝起來上了轎掌禮諸人在前引導一徑擡到魯公船上不許一人報知那易水正在床上思想倚妝只聽得岸上鼓樂喧闐看看近在船邊正要推窗閑望只見司茗跑進艙來說道京堂老爺送親來了嚇得易水沒地縫躲跑將出來望跳板上竟走卻是新人已先出轎立在船頭看見易水要走攔住艙門一把扯定說道余郎好負心也易水不知就裏慌做一團只是抵死掙脫卻被新人牽住衣裳死也不放易水又惱又笑心裏想道人家有這等老臉的女兒有這等與老公的新娘子也顧不得她擡起頭來把她著實一推將她的鳳冠方巾翻落在地露出尊顔卻原來正是倚妝兩人抱住不覺痛哭了一場說明前後原故就趁此鼓樂花燭苦盡甘來歡然合巹惹得京堂公拊掌大笑不止兩人就拜了天地認了夫人就搬到老師家裏住下又張聞知即同文娟來賀梁公不久亦攜弱芳前來一齊相見各訴前情京堂公忽然想起這夢拍手大笑起來說道有這等奇事就將此夢解說與麗卿二人道我前日得救尊正的時節夢見有一尊神道撚著一顆人頭丟在我懷裏正應著收養倚妝後來有一個秀才持刀奪這顆人頭明明應著魯生與我要還他妻子我又將一頂紗帽戴在此生頭上此生拜謝而去明明應著賢契中在本房只這一夢如此靈異我們就該今日望空謝夢並拜謝天地觀音大悲及諸護持神道大開延席暢飲盡興而散看官們你道余夢白偶爾書房寂寞閑踱虎丘造出這掀天揭地從來未有的花案一事連累三茁和尚吃起醋來子彌小官犯起法來焦鬼闊綽霎時間三尺無情夜叉報仇只落得驛亭花燭三女忍受龍宮打散一待詔途次通風忽苦忽酸倏聚倏散不啻糊塗春夢變幻無究因有謝夢聯句詩一首是真是夢是姻緣真夢誰知共一天應謝夢中頻撮合不知還是夢中圓隨後滿假上京奏本複了原姓准他養親三年別了丈人丈母並梁張二公夫婦竟回蘇州原籍當日許多親眷上門拜賀好不熱鬧獨有那貼天飛自那日抛撇夜叉逃回姑蘇家裏已被鄰火延燒妻子相繼歿了身無存倚做了郵亭皂隸撥來與餘翰林管門撞見司茗扯他到大門之後篤地叩頭司茗倒感他放釋之因連忙扶起不題卻說夢白一邊打發人到衢州迎請姑娘同享榮華即查還魯留妻女妹子就將魯留妹子配了司茗各各團圓後人有詩單贊余公夫婦恁地多情極能設身處地體恤下人誠哉與民同之太王之好色也詩曰一席花間生死明幾番顛沛敢渝盟從來節義真堪悼似此恩情來許評射策自能終濟世思春不改舊傾城全憑有夢酬知已累累新詞萬古名又曰笑殺花叢是禍胎離奇分合幻中來青樓淑女心如石白麵才郎意不回魑魎現前誰我敵機緣入夢盡爲媒風流話柄尋常事譜出詞場亦快哉
